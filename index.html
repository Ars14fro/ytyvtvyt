<body class="antialiased selection:bg-indigo-500 selection:text-white">
  <div id="root"></div>

  <script type="text/babel">
    /**
     * FLEXCODE PRO — ИСПРАВЛЕННАЯ ВЕРСИЯ
     * ЧАСТЬ 1:
     * - утилиты
     * - безопасный парсинг
     * - исправленная прогрессия
     */

    const {
      useState,
      useEffect,
      useRef,
      useCallback,
      useMemo,
      createContext,
      useContext
    } = React;

    const SettingsContext = createContext();

    // =============================
    // БЕЗОПАСНЫЕ УТИЛИТЫ
    // =============================

    const safeParse = (value, fallback = null) => {
      try {
        if (value === null || value === undefined) {
          return fallback;
        }

        const parsed = JSON.parse(value);

        return parsed ?? fallback;
      } catch {
        return fallback;
      }
    };

    const toFiniteNumber = (value, fallback = 0) => {
      const num = Number(value);

      return Number.isFinite(num) ? num : fallback;
    };

    const isBodyweight = (value) => {
      return /bw|bodyweight/i.test(String(value ?? ''));
    };

    const parseWeight = (value) => {
      if (value === null || value === undefined) {
        return 0;
      }

      if (isBodyweight(value)) {
        return 0;
      }

      const normalized = String(value)
        .replace(/,/g, '.')
        .replace(/[^0-9.]/g, '');

      const parsed = parseFloat(normalized);

      return Number.isFinite(parsed) ? parsed : 0;
    };

    const normalizeWeightInput = (value) => {
      if (value === null || value === undefined) {
        return '';
      }

      const str = String(value).trim();

      if (/bw|bodyweight/i.test(str)) {
        return 'BW';
      }

      const normalized = str
        .replace(/,/g, '.')
        .replace(/[^0-9.]/g, '');

      const parsed = parseFloat(normalized);

      if (!Number.isFinite(parsed)) {
        return '';
      }

      return String(parsed);
    };

    const formatWeight = (value) => {
      if (value === null || value === undefined) {
        return '';
      }

      if (isBodyweight(value)) {
        return 'BW';
      }

      const num = parseWeight(value);

      if (!num || num <= 0) {
        return '';
      }

      return `${num}kg`;
    };

    const roundWeight = (value) => {
      const num = toFiniteNumber(value, 0);

      return Math.round(num * 100) / 100;
    };

    const parseFirstReps = (value) => {
      if (value === null || value === undefined) {
        return 0;
      }

      const str = String(value).toLowerCase().trim();

      if (str === 'max') {
        return 0;
      }

      const first = parseInt(str.split('-')[0], 10);

      return Number.isFinite(first) ? first : 0;
    };

    const parseUpperReps = (value) => {
      if (value === null || value === undefined) {
        return 0;
      }

      const str = String(value).toLowerCase().trim();

      if (str === 'max') {
        return 0;
      }

      const parts = str.split('-');

      if (parts.length > 1) {
        const upper = parseInt(parts[1], 10);

        if (Number.isFinite(upper)) {
          return upper;
        }
      }

      return parseFirstReps(value);
    };

    const parseSetReps = (value) => {
      const parsed = parseInt(value, 10);

      return Number.isFinite(parsed) ? parsed : 0;
    };

    const sortSets = (sets = []) => {
      return [...sets].sort((a, b) => {
        const setA = toFiniteNumber(a?.setNumber, 0);
        const setB = toFiniteNumber(b?.setNumber, 0);

        if (setA !== setB) {
          return setA - setB;
        }

        return new Date(a?.timestamp || 0) - new Date(b?.timestamp || 0);
      });
    };

    const formatTime = (seconds) => {
      const safeSeconds = toFiniteNumber(seconds, 0);

      if (safeSeconds === null || Number.isNaN(safeSeconds)) {
        return '0:00';
      }

      const m = Math.floor(safeSeconds / 60);
      const s = safeSeconds % 60;

      return `${m}:${s < 10 ? '0' : ''}${s}`;
    };

    const formatDateTime = (date) => {
      return new Date(date).toLocaleDateString('ru-RU', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    };

    const generateId = () => {
      return Math.random().toString(36).substr(2, 9);
    };

    const getGreeting = () => {
      const hour = new Date().getHours();

      if (hour < 12) {
        return 'Доброе утро';
      }

      if (hour < 18) {
        return 'Добрый день';
      }

      return 'Добрый вечер';
    };

    const getCurrentDay = () => {
      const days = [
        'Sunday',
        'Monday',
        'Tuesday',
        'Wednesday',
        'Thursday',
        'Friday',
        'Saturday'
      ];

      return days[new Date().getDay()];
    };

    const isSameDay = (a, b) => {
      return new Date(a).toDateString() === new Date(b).toDateString();
    };

    const getWeekStartMonday = (date = new Date()) => {
      const d = new Date(date);
      const day = d.getDay() || 7;

      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - day + 1);

      return d;
    };

    const stripProgramProgressionMeta = (program) => {
      const copy = JSON.parse(JSON.stringify(program || {}));

      if (Array.isArray(copy.exercises)) {
        copy.exercises.forEach(ex => {
          delete ex.hasProgression;
          delete ex.progressionText;
        });
      }

      return copy;
    };

    // =============================
    // НОВЫЕ HELPERS ДЛЯ ТАЙМЕРОВ
    // =============================

    const getWorkDuration = (exercise) => {
      const timer = Number(exercise?.timer);

      if (Number.isFinite(timer)) {
        return Math.max(0, timer);
      }

      return 60;
    };

    const getRestDuration = (exercise, workout) => {
      const rest = Number(exercise?.restAfter);

      if (Number.isFinite(rest)) {
        return Math.max(0, rest);
      }

      const globalRest = Number(workout?.globalRestTime);

      if (Number.isFinite(globalRest)) {
        return Math.max(0, globalRest);
      }

      return 60;
    };

    // =============================
    // ОБЪЁМ И СТРИКИ
    // =============================

    const calculateTrainingVolume = (exercise, setRecord = null) => {
      const type = setRecord?.type || exercise?.type;

      if (type === 'time') {
        return 0;
      }

      const weight = parseWeight(setRecord?.weight ?? exercise?.weight);

      if (!weight) {
        return 0;
      }

      let reps = parseSetReps(setRecord?.reps);

      if (!reps) {
        reps = parseFirstReps(exercise?.reps);
      }

      return weight * reps;
    };

    const calculateDailyStreak = (history) => {
      if (!Array.isArray(history) || history.length === 0) {
        return 0;
      }

      const dates = [
        ...new Set(history.map(h => new Date(h.date).toDateString()))
      ];

      const today = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();

      if (!dates.includes(today) && !dates.includes(yesterday)) {
        return 0;
      }

      let streak = 0;
      let current = new Date();

      if (!dates.includes(current.toDateString())) {
        current.setDate(current.getDate() - 1);
      }

      while (dates.includes(current.toDateString())) {
        streak++;
        current.setDate(current.getDate() - 1);
      }

      return streak;
    };

    const calculateStreak = (history) => {
      if (!Array.isArray(history) || history.length === 0) {
        return 0;
      }

      const weeks = [
        ...new Set(history.map(h => {
          const d = new Date(h.date);
          const day = d.getDay() || 7;

          d.setHours(0, 0, 0, 0);
          d.setDate(d.getDate() - day + 1);

          return d.getTime();
        }))
      ].sort((a, b) => b - a);

      if (weeks.length === 0) {
        return 0;
      }

      const now = new Date();
      const currentDay = now.getDay() || 7;

      now.setHours(0, 0, 0, 0);
      now.setDate(now.getDate() - currentDay + 1);

      const currentWeekTime = now.getTime();
      const msInWeek = 7 * 24 * 60 * 60 * 1000;

      if (currentWeekTime - weeks[0] > msInWeek) {
        return 0;
      }

      let streak = 0;
      let expectedWeek = weeks[0];

      for (let i = 0; i < weeks.length; i++) {
        if (weeks[i] === expectedWeek) {
          streak++;
          expectedWeek -= msInWeek;
        } else {
          break;
        }
      }

      return streak;
    };

    // =============================
    // ИСПРАВЛЕННАЯ ПРОГРЕССИЯ
    // =============================

    const calculateProgression = (program, history = []) => {
      if (!program || !Array.isArray(program.exercises)) {
        return program;
      }

      const safeHistory = Array.isArray(history) ? history : [];

      const relevantHistory = safeHistory
        .filter(h => h && h.programId === program.id)
        .sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));

      if (relevantHistory.length === 0) {
        return program;
      }

      const newProgram = JSON.parse(JSON.stringify(program));

      const WEIGHT_TOLERANCE = 0.25;

      const getWorkingSets = (sets, requiredSets) => {
        const sorted = sortSets(sets);

        if (sorted.length < requiredSets) {
          return [];
        }

        return sorted.slice(0, requiredSets);
      };

      const getTopWeight = (sets) => {
        return sets.reduce((max, s) => {
          return Math.max(max, parseWeight(s?.weight));
        }, 0);
      };

      const sessionWeightMatches = (sets, targetWeight, upperTolerance) => {
        if (!targetWeight || targetWeight <= 0) {
          return true;
        }

        const top = getTopWeight(sets);

        if (top <= 0) {
          return false;
        }

        return top >= targetWeight - WEIGHT_TOLERANCE &&
               top <= targetWeight + upperTolerance;
      };

      const setsMeetReps = (sets, targetValue, tolerance = 0) => {
        if (!sets.length) {
          return false;
        }

        if (targetValue <= 0) {
          return sets.every(s => parseSetReps(s?.reps) > 0);
        }

        return sets.every(s => {
          return parseSetReps(s?.reps) >= targetValue - tolerance;
        });
      };

      const setsFailReps = (sets, lowerBound, tolerance = 0) => {
        if (!sets.length) {
          return false;
        }

        if (lowerBound <= 0) {
          return false;
        }

        return sets.some(s => {
          return parseSetReps(s?.reps) < lowerBound - tolerance;
        });
      };

      newProgram.exercises.forEach(exercise => {
        if (!exercise || !exercise.progression) {
          return;
        }

        const progression = exercise.progression || {};
        const type = progression.type;

        if (!type) {
          return;
        }

        exercise.sets = Math.max(1, toFiniteNumber(exercise.sets, 1) || 1);
        exercise.restAfter = toFiniteNumber(exercise.restAfter, 0);

        if (exercise.timer !== undefined) {
          exercise.timer = toFiniteNumber(exercise.timer, 0);
        }

        exercise.hasProgression = false;
        delete exercise.progressionText;

        const defaultIncrement =
          type === 'weight' || type === 'double'
            ? 2.5
            : 1;

        const increment =
          toFiniteNumber(progression.increment, defaultIncrement) ||
          defaultIncrement;

        const thresholdRaw = toFiniteNumber(progression.threshold, 1);
        const threshold = thresholdRaw >= 1 ? Math.floor(thresholdRaw) : 1;

        const repTolerance = toFiniteNumber(progression.repTolerance, 0);

        const deloadThresholdDefault = type === 'double' ? 2 : 3;

        const deloadThresholdRaw = toFiniteNumber(
          progression.deloadThreshold,
          deloadThresholdDefault
        );

        const deloadThreshold =
          deloadThresholdRaw >= 1
            ? Math.floor(deloadThresholdRaw)
            : deloadThresholdDefault;

        const deloadPercentRaw = toFiniteNumber(progression.deloadPercent, 10);

        const deloadPercent = Number.isFinite(deloadPercentRaw)
          ? deloadPercentRaw
          : 10;

        const maxSetsRaw = toFiniteNumber(progression.maxSets, 10);

        const maxSets =
          maxSetsRaw >= exercise.sets
            ? Math.floor(maxSetsRaw)
            : Math.max(10, exercise.sets);

        const bw = isBodyweight(exercise.weight);
        const plannedWeight = parseWeight(exercise.weight);

        const requiresNumericWeight =
          type === 'weight' || type === 'double';

        if (requiresNumericWeight && (bw || plannedWeight <= 0)) {
          return;
        }

        const repsLower = parseFirstReps(exercise.reps);
        const repsUpper = parseUpperReps(exercise.reps);

        const isMaxReps =
          String(exercise.reps || '').toLowerCase().trim() === 'max';

        const targetRpe = toFiniteNumber(exercise.rpe, 8) || 8;

        const sessions = [];

        relevantHistory.forEach(h => {
          if (!Array.isArray(h.completedSets)) {
            return;
          }

          const sets = sortSets(
            h.completedSets.filter(s => s && s.exerciseId === exercise.id)
          );

          if (sets.length > 0) {
            sessions.push({
              date: h.date,
              sets
            });
          }
        });

        if (sessions.length === 0) {
          return;
        }

        const lastSession = sessions[sessions.length - 1];
        const lastAllSets = lastSession.sets;
        const lastTopWeight = getTopWeight(lastAllSets);

        const baseWeight = plannedWeight > 0
          ? plannedWeight
          : lastTopWeight;

        const upperWeightTolerance = Math.max(
          1,
          increment * 2,
          requiresNumericWeight ? 5 : 1
        );

        const maxRpe = lastAllSets.reduce((max, s) => {
          return Math.max(max, toFiniteNumber(s?.rpe, 0));
        }, 0);

        const isHighRpe = maxRpe > targetRpe;

        const requiredSets = exercise.sets;
        const lastWorkingSets = getWorkingSets(lastAllSets, requiredSets);

        if (lastWorkingSets.length === 0) {
          if (requiresNumericWeight) {
            exercise.weight = formatWeight(baseWeight) || exercise.weight;
          }

          return;
        }

        const weightOk = sessionWeightMatches(
          lastAllSets,
          baseWeight,
          upperWeightTolerance
        );

        if (requiresNumericWeight && !weightOk) {
          exercise.weight = formatWeight(baseWeight) || exercise.weight;
          exercise.progressionText = 'Вес изменился — серия сброшена';
          exercise.hasProgression = true;

          return;
        }

        const countStreak = (mode) => {
          let success = 0;
          let fail = 0;

          for (let i = sessions.length - 1; i >= 0; i--) {
            const sets = sessions[i].sets;
            const working = getWorkingSets(sets, requiredSets);

            if (working.length === 0) {
              break;
            }

            if (
              requiresNumericWeight &&
              !sessionWeightMatches(sets, baseWeight, upperWeightTolerance)
            ) {
              break;
            }

            let target = 0;
            let lower = 0;

            if (type === 'double') {
              target = repsUpper || repsLower;
              lower = repsLower;
            } else if (type === 'weight') {
              target = repsLower;
              lower = repsLower;
            } else if (type === 'reps') {
              target = repsUpper || repsLower;
              lower = repsLower;
            } else if (type === 'time') {
              target = toFiniteNumber(exercise.timer, 0);
              lower = target;
            } else if (type === 'sets') {
              target = repsLower;
              lower = repsLower;
            }

            const ok = setsMeetReps(working, target, repTolerance);
            const failed = setsFailReps(working, lower, repTolerance);

            if (mode === 'success') {
              if (ok) {
                success++;
              } else {
                break;
              }
            } else if (mode === 'fail') {
              if (failed) {
                fail++;
              } else {
                break;
              }
            } else {
              if (ok) {
                success++;
                fail = 0;
              } else if (failed) {
                fail++;
                success = 0;
              } else {
                break;
              }
            }
          }

          return { success, fail };
        };

        const applyWeightIncrease = (text) => {
          const nextWeight = roundWeight(baseWeight + increment);

          exercise.weight = `${nextWeight}kg`;
          exercise.progressionText = text || `+${increment}kg`;
          exercise.hasProgression = true;
        };

        const applyDeload = () => {
          const nextWeight = Math.max(
            0,
            roundWeight(baseWeight * (1 - deloadPercent / 100))
          );

          exercise.weight = `${nextWeight}kg`;
          exercise.progressionText = `Разгрузка -${deloadPercent}%`;
          exercise.hasProgression = true;
        };

        const applyHold = () => {
          if (requiresNumericWeight) {
            exercise.weight = formatWeight(baseWeight) || exercise.weight;
          }

          exercise.progressionText = `Удержание (RPE ${maxRpe})`;
          exercise.hasProgression = true;
        };

        if (type === 'double') {
          const targetReps = repsUpper || repsLower;

          if (!targetReps) {
            return;
          }

          const successStreak = countStreak('success').success;
          const failStreak = countStreak('fail').fail;

          const isSuccess = successStreak >= threshold;
          const isFail = failStreak >= deloadThreshold;

          if (isHighRpe && isSuccess) {
            applyHold();
          } else if (isFail) {
            applyDeload();
          } else if (isSuccess) {
            applyWeightIncrease(`+${increment}kg (цель ${targetReps})`);
          } else {
            exercise.weight = formatWeight(baseWeight) || exercise.weight;

            if (threshold > 1 && successStreak > 0) {
              exercise.progressionText = `Закрепление ${successStreak}/${threshold}`;
              exercise.hasProgression = true;
            } else if (failStreak > 0) {
              exercise.progressionText = `Неудача ${failStreak}/${deloadThreshold}`;
              exercise.hasProgression = true;
            }
          }
        } else if (type === 'weight') {
          const targetReps = repsLower;

          if (!targetReps) {
            return;
          }

          const streak = countStreak('both');

          if (streak.fail >= deloadThreshold) {
            applyDeload();
          } else if (streak.success >= threshold) {
            if (isHighRpe) {
              applyHold();
            } else {
              applyWeightIncrease(`+${increment}kg`);
            }
          } else {
            exercise.weight = formatWeight(baseWeight) || exercise.weight;

            if (threshold > 1 && streak.success > 0) {
              exercise.progressionText = `Закрепление ${streak.success}/${threshold}`;
              exercise.hasProgression = true;
            } else if (streak.fail > 0) {
              exercise.progressionText = `Неудача ${streak.fail}/${deloadThreshold}`;
              exercise.hasProgression = true;
            }
          }
        } else if (type === 'reps') {
          if (isMaxReps) {
            return;
          }

          const targetReps = repsUpper || repsLower;

          if (!targetReps) {
            return;
          }

          const successStreak = countStreak('success').success;

          if (successStreak >= threshold && !isHighRpe) {
            if (String(exercise.reps || '').includes('-')) {
              const lower = repsLower + increment;
              const upper = repsUpper + increment;

              exercise.reps = `${lower}-${upper}`;
            } else {
              exercise.reps = String(targetReps + increment);
            }

            exercise.progressionText = `+${increment} повт`;
            exercise.hasProgression = true;
          } else {
            if (isHighRpe && successStreak >= threshold) {
              applyHold();
            } else if (threshold > 1 && successStreak > 0) {
              exercise.progressionText = `Закрепление ${successStreak}/${threshold}`;
              exercise.hasProgression = true;
            }
          }
        } else if (type === 'time') {
          const targetTime = toFiniteNumber(exercise.timer, 0);

          if (targetTime <= 0) {
            return;
          }

          const successStreak = countStreak('success').success;

          if (successStreak >= threshold && !isHighRpe) {
            exercise.timer = targetTime + increment;
            exercise.progressionText = `+${increment}с`;
            exercise.hasProgression = true;
          } else {
            if (isHighRpe && successStreak >= threshold) {
              applyHold();
            } else if (threshold > 1 && successStreak > 0) {
              exercise.progressionText = `Закрепление ${successStreak}/${threshold}`;
              exercise.hasProgression = true;
            }
          }
        } else if (type === 'sets') {
          const targetReps = repsLower;

          const successStreak = countStreak('success').success;

          if (successStreak >= threshold && !isHighRpe) {
            if (exercise.sets < maxSets) {
              exercise.sets = exercise.sets + increment;
              exercise.progressionText = `+${increment} подход`;
              exercise.hasProgression = true;
            } else {
              exercise.progressionText = 'Лимит подходов';
              exercise.hasProgression = true;
            }
          } else {
            if (isHighRpe && successStreak >= threshold) {
              applyHold();
            } else if (threshold > 1 && successStreak > 0) {
              exercise.progressionText = `Закрепление ${successStreak}/${threshold}`;
              exercise.hasProgression = true;
            }
          }
        }
      });

      return newProgram;
    };

    const getWorkoutVolume = ({ workoutResult = {}, programs = [] } = {}) => {
      if (!workoutResult || !Array.isArray(workoutResult.completedSets)) {
        return 0;
      }

      const program = programs.find(p => {
        return p && p.id === workoutResult.programId;
      });

      if (!program || !Array.isArray(program.exercises)) {
        return 0;
      }

      return workoutResult.completedSets.reduce((sum, set) => {
        const exercise = program.exercises.find(ex => {
          return ex && ex.id === set.exerciseId;
        });

        return sum + calculateTrainingVolume(exercise || {}, set);
      }, 0);
    };

    const getSortedHistoryDates = (history = []) => {
      if (!Array.isArray(history)) {
        return [];
      }

      return history
        .map(h => new Date(h?.date).getTime())
        .filter(ts => Number.isFinite(ts))
        .sort((a, b) => a - b);
    };

        const safeUnlocked = Array.isArray(unlockedIds) ? unlockedIds : [];
        const newAchievements = [];

        for (const id in ACHIEVEMENTS) {
          if (safeUnlocked.includes(id)) {
            continue;
          }

          const checker = AchievementEngine.checkers[id];

          if (checker && checker.trigger === trigger) {
            try {
              if (checker.condition(data)) {
                newAchievements.push(id);
              }
            } catch (error) {
              console.error(`Ошибка проверки достижения: ${id}`, error);
            }

        let totalUnlocked = safeUnlocked.length + newAchievements.length;

        if (!safeUnlocked.includes('grandmaster') && totalUnlocked >= 20) {
          newAchievements.push('grandmaster');
          totalUnlocked++;
        }

        if (
          !safeUnlocked.includes('flex_code_elite') &&
          totalUnlocked >= Object.keys(ACHIEVEMENTS).length - 1
        ) {
          newAchievements.push('flex_code_elite');
        }

        return [...new Set(newAchievements)];

          trigger: 'onWorkoutComplete',
          condition: ({ history = [] } = {}) => {
            const dates = getSortedHistoryDates(history);

            if (dates.length < 2) {
              return false;
            }

            const months = (Date.now() - dates[0]) / (1000 * 60 * 60 * 24 * 30);

            return months >= 6;
          }
        },

        legend: {
          trigger: 'onWorkoutComplete',
          condition: ({ history = [] } = {}) => {
            const dates = getSortedHistoryDates(history);

            if (dates.length < 2) {
              return false;
            }

            const years = (Date.now() - dates[0]) / (1000 * 60 * 60 * 24 * 365);

            return years >= 1;
          }
        },

        the_return: {
          trigger: 'onWorkoutComplete',
          condition: ({ history = [] } = {}) => {
            const dates = getSortedHistoryDates(history);

            if (dates.length < 2) {
              return false;
            }

            const last = dates[dates.length - 1];
            const previous = dates[dates.length - 2];

            return (last - previous) / (1000 * 60 * 60 * 24) >= 14;
          }
        },

        endurance_king: {
          trigger: 'onWorkoutComplete',
          condition: ({ history = [] } = {}) => {
            if (!Array.isArray(history)) {
              return false;
            }

            const totalSeconds = history.reduce((acc, curr) => {
              return acc + toFiniteNumber(curr?.duration, 0);
            }, 0);

            return totalSeconds >= 24 * 3600;
          }
        },

        high_rep: {
          trigger: 'onWorkoutComplete',
          condition: ({ workoutResult = {} } = {}) => {
            const sets = workoutResult?.completedSets;

            if (!Array.isArray(sets)) {
              return false;
            }

            return sets.some(set => parseSetReps(set?.reps) >= 20);
          }
        },

        to_failure: {
          trigger: 'onWorkoutComplete',
          condition: ({ workoutResult = {} } = {}) => {
            const sets = workoutResult?.completedSets;

            if (!Array.isArray(sets)) {
              return false;
            }

            return sets.some(set => {
              return set?.type === 'time' && parseSetReps(set?.reps) >= 120;
            });
          }
        },

        full_body: {
          trigger: 'onWorkoutComplete',
          condition: ({ workoutResult = {}, programs = [] } = {}) => {
            const sets = workoutResult?.completedSets;

            if (!Array.isArray(sets)) {
              return false;
            }

            const program = programs.find(p => {
              return p && p.id === workoutResult.programId;
            });

            if (!program || !Array.isArray(program.exercises)) {
              return false;
            }

            const equipment = new Set();

            sets.forEach(set => {
              const exercise = program.exercises.find(ex => {
                return ex && ex.id === set.exerciseId;
              });

              if (exercise && exercise.equipment) {
                equipment.add(exercise.equipment);
              }
            });

            return equipment.size >= 5;
          }
        },

        beta_tester: {
          trigger: 'onSettingsChange',
          condition: () => Math.random() > 0.8
        },

        explorer: {
          trigger: 'onProgramSave',
          condition: () => true

    const AudioEngine = {
      ctx: null,
      gainNode: null,
      initialized: false,

      init() {
        if (this.initialized) {
          return;
        }

        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;

          this.ctx = new AudioContext();
          this.gainNode = this.ctx.createGain();
          this.gainNode.connect(this.ctx.destination);
          this.initialized = true;
        } catch (error) {
          console.error('Web Audio API not supported', error);
        }
      },

      playTone(freq, type, duration, volume = 0.5) {
        if (!this.initialized) {
          this.init();
        }

        if (!this.ctx) {
          return;
        }

        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);

        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      },

      playBeep() {
        this.playTone(800, 'sine', 0.1, 0.3);
      },

      playStart() {
        this.playTone(1200, 'square', 0.15, 0.4);
      },

      playCountdown() {
        this.playTone(600, 'triangle', 0.1, 0.3);
      },

      playRest() {
        this.playTone(400, 'sine', 0.2, 0.3);

        setTimeout(() => {
          this.playTone(300, 'sine', 0.4, 0.3);
        }, 150);
      },

      playComplete() {
        [440, 554, 659].forEach((freq, i) => {
          setTimeout(() => {
            this.playTone(freq, 'triangle', 0.6, 0.2);
          }, i * 50);
        });
      },

      playClick() {
        this.playTone(1200, 'sine', 0.05, 0.05);
      },

      playNotification() {
        [523.25, 659.25, 783.99].forEach((freq, i) => {
          setTimeout(() => {
            this.playTone(freq, 'sine', 0.2, 0.3);
          }, i * 150);
        });
      },

      speak(text) {
        if (!window.speechSynthesis) {
          return;
        }

        window.speechSynthesis.cancel();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        msg.rate = 1.1;

        window.speechSynthesis.speak(msg);
      }
    };

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);

        this.state = {
          hasError: false,
          error: null
        };
      }

      static getDerivedStateFromError(error) {
        return {
          hasError: true,
          error
        };
      }

      componentDidCatch(error, errorInfo) {
        console.error('React ErrorBoundary caught:', error, errorInfo);
      }

      handleReset = async () => {
        try {
          localStorage.clear();

          if (window.localforage) {
            await window.localforage.clear();
          }
        } catch (error) {
          console.error('Ошибка сброса данных:', error);
        }

        window.location.reload();
      };

      render() {
        if (this.state.hasError) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen bg-dark text-white p-6 text-center">
              <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mb-4">
                <Icon name="alert-triangle" className="text-red-500 w-8 h-8" />
              </div>

              <h2 className="text-2xl font-bold mb-2">
                Что-то пошло не так
              </h2>

              <p className="text-gray-400 mb-6 max-w-md">
                Произошла критическая ошибка. Возможно, загруженные данные повреждены.
              </p>

              <div className="bg-black/30 p-4 rounded-lg text-left font-mono text-xs text-red-300 mb-6 w-full max-w-lg overflow-auto">
                {this.state.error && this.state.error.toString()}
              </div>

              <button
                onClick={this.handleReset}
                className="px-6 py-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold transition-colors"
              >
                Сбросить данные и перезагрузить
              </button>
            </div>
          );
        }

        return this.props.children;
      }
    }

    const normalizeProgramsForSave = (parsed) => {
      if (!Array.isArray(parsed)) {
        throw new Error('Корень должен быть массивом (Array)');
      }

      const programIds = parsed.map(p => p?.id).filter(Boolean);

      if (programIds.some((val, i) => programIds.indexOf(val) !== i)) {
        throw new Error('Найдены дублирующиеся ID программ. Все ID должны быть уникальными.');
      }

      return parsed.map((prog, programIndex) => {
        if (!prog || typeof prog !== 'object') {
          throw new Error(`Программа #${programIndex + 1}: некорректный объект`);
        }

        if (!prog.scheduleName) {
          throw new Error(`Программа #${programIndex + 1}: нет названия (scheduleName)`);
        }

        if (!prog.id) {
          prog.id = generateId();
        }

        if (
          prog.dayOfWeek === null ||
          prog.dayOfWeek === undefined ||
          String(prog.dayOfWeek).trim() === ''
        ) {
          delete prog.dayOfWeek;
        }

        if (!prog.color) {
          prog.color = '#6366f1';
        }

        prog.globalRestTime = Math.max(
          0,
          toFiniteNumber(prog.globalRestTime, 90)
        );

        if (!Array.isArray(prog.exercises)) {
          throw new Error(`Программа "${prog.scheduleName}": упражнения должны быть массивом`);
        }

        const exerciseIds = prog.exercises.map(ex => ex?.id).filter(Boolean);

        if (exerciseIds.some((val, i) => exerciseIds.indexOf(val) !== i)) {
          throw new Error(`Программа "${prog.scheduleName}": найдены дублирующиеся ID упражнений`);
        }

        prog.exercises = prog.exercises.map((ex, exerciseIndex) => {
          if (!ex || typeof ex !== 'object') {
            throw new Error(`Программа "${prog.scheduleName}", упражнение #${exerciseIndex + 1}: некорректный объект`);
          }

          if (!ex.name) {
            throw new Error(`Программа "${prog.scheduleName}", упражнение #${exerciseIndex + 1}: нет названия`);
          }

          if (!ex.id) {
            ex.id = generateId();
          }

          if (!ex.type) {
            ex.type = 'reps';
          }

          ex.sets = Math.max(
            1,
            Math.floor(toFiniteNumber(ex.sets, 3)) || 3
          );

          ex.restAfter = Math.max(
            0,
            toFiniteNumber(ex.restAfter, 60)
          );

          if (ex.type === 'time') {
            ex.timer = Math.max(
              1,
              toFiniteNumber(ex.timer, 60)
            );
          }

          if (ex.weight !== undefined && ex.weight !== null) {
            const normalizedWeight = normalizeWeightInput(ex.weight);

            if (normalizedWeight === 'BW') {
              ex.weight = 'BW';
            } else if (normalizedWeight) {
              ex.weight = `${normalizedWeight}kg`;
            } else {
              ex.weight = '';
            }
          }

          delete ex.hasProgression;
          delete ex.progressionText;

          if (ex.progression && typeof ex.progression === 'object') {
            const p = ex.progression;

            if (!p.type) {
              delete ex.progression;
            } else {
              if (p.increment !== undefined) {
                p.increment = toFiniteNumber(p.increment, 1) || 1;
              }

              if (p.threshold !== undefined) {
                p.threshold = toFiniteNumber(p.threshold, 1);
              }

              if (p.repTolerance !== undefined) {
                p.repTolerance = toFiniteNumber(p.repTolerance, 0);
              }

              if (p.deloadThreshold !== undefined) {
                p.deloadThreshold = toFiniteNumber(p.deloadThreshold, 2);
              }

              if (p.deloadPercent !== undefined) {
                p.deloadPercent = toFiniteNumber(p.deloadPercent, 10);
              }

              if (p.maxSets !== undefined) {
                p.maxSets = toFiniteNumber(p.maxSets, 10);
              }
            }
          }

          return ex;
        });

        return prog;
      });
    };
