                                        </div>
                                    </div>
                                    <button onClick={() => { if(confirm('Удалить?')) setReminders(prev => prev.filter(x => x.id !== r.id)) }} className="p-2 text-gray-500 hover:text-red-400">
                                        <Icon name="trash-2" size={16} />
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };
 
        const WorkspaceManagerModal = ({ isOpen, onClose, workspaces, activeId, onSwitch, onCreate, onDelete, onRename }) => {
            const [newName, setNewName] = useState('');
            const [isCreating, setIsCreating] = useState(false);
            if (!isOpen) return null;
            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Профили (Циклы)" size="sm">
                    <div className="space-y-4">
                        <p className="text-sm text-gray-400">Создавайте разные профили, чтобы разделять тренировочные циклы (например: "Сила", "Масса", "Домашняя"). У каждого профиля своя история, статистика и расписание.</p>
                        <div className="space-y-2">
                            {workspaces.map(ws => (
                                <div key={ws.id} className={`flex items-center justify-between p-3 rounded-xl border ${activeId === ws.id ? 'bg-indigo-500/20 border-indigo-500/50' : 'bg-surface border-white/5'}`}>
                                    <div className="flex-1 cursor-pointer" onClick={() => { onSwitch(ws.id); onClose(); }}>
                                        <h4 className={`font-bold ${activeId === ws.id ? 'text-indigo-300' : 'text-white'}`}>{ws.name}</h4>
                                        {activeId === ws.id && <span className="text-xs text-indigo-400">Текущий профиль</span>}
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => { const nn = prompt('Новое название:', ws.name); if(nn) onRename(ws.id, nn); }} className="p-2 text-gray-400 hover:text-white"><Icon name="edit-2" size={16}/></button>
                                        {workspaces.length > 1 && (
                                            <button onClick={() => { if(confirm(`Удалить профиль "${ws.name}" и ВСЮ его историю?`)) onDelete(ws.id); }} className="p-2 text-red-400 hover:text-red-300"><Icon name="trash-2" size={16}/></button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                        {isCreating ? (
                            <div className="flex gap-2 mt-4">
                                <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Имя профиля..." className="flex-1 bg-dark border border-white/10 rounded-lg px-3 py-2 text-white outline-none focus:border-indigo-500" autoFocus/>
                                <Button size="sm" onClick={() => { if(newName.trim()){ onCreate(newName); setIsCreating(false); setNewName(''); } }}>Добавить</Button>
                                <Button size="sm" variant="ghost" onClick={() => setIsCreating(false)}>Отмена</Button>
                            </div>
                        ) : (
                            <Button variant="secondary" icon="plus" className="w-full mt-4" onClick={() => setIsCreating(true)}>Создать новый профиль</Button>
                        )}
                    </div>
                </Modal>
            );
        };

        const App = () => {
                                                const [workspaces, setWorkspaces] = useState([{ id: 'default', name: 'Основной профиль' }]);
            const [activeWorkspaceId, setActiveWorkspaceId] = useState('default');
            const [isWorkspaceManagerOpen, setIsWorkspaceManagerOpen] = useState(false);
            const [view, setView] = useState('schedule');
            const [programs, setPrograms] = useState([]);
            const [activeWorkout, setActiveWorkout] = useState(null);
            const [history, setHistory] = useState([]);
            const [selectedProgram, setSelectedProgram] = useState(null);
            const [notifications, setNotifications] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS.player);
            const [reminders, setReminders] = useState([]);
            const [isAppInitialized, setIsAppInitialized] = useState(false);
            const [isEditorOpen, setIsEditorOpen] = useState(false);
            const [isAchievementsOpen, setIsAchievementsOpen] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [unlockedAchievements, setUnlockedAchievements] = useState([]);
            const checkedDraftsRef = useRef(new Set());
            
            useEffect(() => {
                if (isAppInitialized && !isLoading) {
                    // Проверяем черновики для КАЖДОГО профиля, но только один раз за сессию для конкретного профиля
                    if (!checkedDraftsRef.current.has(activeWorkspaceId)) {
                        checkedDraftsRef.current.add(activeWorkspaceId);
                        const draftStr = localStorage.getItem(`flexcode_draft_${activeWorkspaceId}`);
                        if (draftStr) {
                            try {
                                const draft = JSON.parse(draftStr);
                                if (Date.now() - draft.timestamp < 12 * 60 * 60 * 1000 && programs.some(p => p.id === draft.workout?.id)) { 
                                    if (confirm(`В профиле найдена незавершенная тренировка! Продолжить?`)) {
                                        setActiveWorkout(draft.workout);
                                    } else { localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`); }
                                } else { localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`); }
                            } catch (e) {}
                        }
                    }
                }
            }, [isAppInitialized, isLoading, activeWorkspaceId, programs]);


            const progressedPrograms = useMemo(() => {
                if (isLoading) return [];
                return programs.map(p => calculateProgression(p, history));
            }, [programs, history, isLoading]);


                                    // Загрузка данных (С учетом профилей)
            const remindersRef = useRef(reminders);
                        const notifiedRemindersRef = useRef(new Set());
            const currentDataWorkspaceRef = useRef('default');

            // Тихо обновляем Ref без перезапуска таймера
            useEffect(() => {
                remindersRef.current = reminders;
            }, [reminders]);

            // Сам таймер запускается строго один раз
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const todayStr = now.toDateString();
                    const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    
                    remindersRef.current.forEach(r => {
                        if (r.trigger === 'time' && r.time === timeStr && r.lastCompleted !== todayStr) {
                            const notifKey = `${r.id}_${todayStr}`;
                            // Защита от спама: уведомляем только один раз в день для конкретного времени
                            if (!notifiedRemindersRef.current.has(notifKey)) {
                                addNotification('info', '⏰ Время добавок!', `Примите: ${r.title} (${r.dosage})`);
                                notifiedRemindersRef.current.add(notifKey);
                                // разовые напоминания удаляются только вручную через интерфейс
                            }
                        }
                    });
                }, 10000); // Чекаем каждые 10 секунд, чтобы точно попасть в минуту
                return () => clearInterval(interval);
            }, []);

                                    // Инициализация IndexedDB (Оптимизирована через Promise.all)
            useEffect(() => {
                const initApp = async () => {
                    try {
                        const [w, a, s] = await Promise.all([
                            localforage.getItem('flexcode_workspaces'),
                            localforage.getItem('flexcode_active_workspace'),
                            localforage.getItem('flexcode_settings')
                        ]);
                        if (w) setWorkspaces(w);
                        if (a) setActiveWorkspaceId(a);
                        if (s) setSettings(s);
                    } catch(e) { console.error(e); } finally { setIsAppInitialized(true); }
                };
                initApp();
            }, []);

                        // Загрузка данных профиля
            useEffect(() => {
                if (!isAppInitialized) return;
                let isMounted = true;
                const loadWorkspaceData = async () => {
                    setIsLoading(true);
                    try {
                        const suffix = activeWorkspaceId === 'default' ? '' : `_${activeWorkspaceId}`;
                        const [p, h, ach, r] = await Promise.all([
                            localforage.getItem(`flexcode_programs${suffix}`),
                            localforage.getItem(`flexcode_history${suffix}`),
                            localforage.getItem(`flexcode_achievements${suffix}`),
                            localforage.getItem(`flexcode_reminders${suffix}`)
                        ]);

                        if (isMounted) {
                            setPrograms(p || DEFAULT_PROGRAM);
                            setHistory(h || []);
                            setUnlockedAchievements(ach || []);
                            setReminders(r || []);
                            currentDataWorkspaceRef.current = activeWorkspaceId; // Отмечаем, что стейты теперь соответствуют новому профилю
                            await localforage.setItem('flexcode_active_workspace', activeWorkspaceId);
                        }
                    } catch (e) { console.error(e); } finally { if (isMounted) setIsLoading(false); }
                };
                loadWorkspaceData();
                return () => { isMounted = false; };
            }, [activeWorkspaceId, isAppInitialized]);

            // Асинхронное сохранение (IndexedDB)
            useEffect(() => {
                // СОХРАНЯЕМ ТОЛЬКО ЕСЛИ данные в памяти (currentDataWorkspaceRef) соответствуют текущему выбранному профилю
                // Это предотвращает баг, когда при переключении профиля старые стейты сохранялись в новый профиль
                if (!isLoading && isAppInitialized && currentDataWorkspaceRef.current === activeWorkspaceId) {
                    const suffix = activeWorkspaceId === 'default' ? '' : `_${activeWorkspaceId}`;
                    localforage.setItem(`flexcode_programs${suffix}`, programs);
                    localforage.setItem(`flexcode_history${suffix}`, history);
                    localforage.setItem(`flexcode_achievements${suffix}`, unlockedAchievements);
                    localforage.setItem(`flexcode_reminders${suffix}`, reminders);
                    localforage.setItem('flexcode_settings', settings);
                    localforage.setItem('flexcode_workspaces', workspaces);
                }
            }, [programs, history, settings, unlockedAchievements, reminders, activeWorkspaceId, workspaces, isLoading, isAppInitialized]);

            // Управление профилями
            const handleCreateWorkspace = (name) => {
                const newId = 'ws_' + Date.now();
                setWorkspaces([...workspaces, { id: newId, name }]);
                setActiveWorkspaceId(newId); // Автоматом переключаем на новый
            };
                        const handleDeleteWorkspace = (id) => {
                const updated = workspaces.filter(w => w.id !== id);
                setWorkspaces(updated);
                if (activeWorkspaceId === id) {
                    setActiveWorkspaceId(updated[0].id);
                    // Мгновенно зачищаем стейты, чтобы не мелькали фантомные данные
                    setPrograms([]); setHistory([]); setReminders([]); setUnlockedAchievements([]);
                }
                // Очистка IndexedDB и localStorage
                localforage.removeItem(`flexcode_programs_${id}`);
                localforage.removeItem(`flexcode_history_${id}`);
                localforage.removeItem(`flexcode_achievements_${id}`);
                localforage.removeItem(`flexcode_reminders_${id}`);
                if (activeWorkout) setActiveWorkout(null);
                localStorage.removeItem(`flexcode_draft_${id}`);
            };
            const handleRenameWorkspace = (id, newName) => {
                setWorkspaces(workspaces.map(w => w.id === id ? { ...w, name: newName } : w));
            };



            // Обработчики
            const handleNewAchievements = (newIds) => {
                if (newIds.length > 0) {
                    const updatedAchievements = [...new Set([...unlockedAchievements, ...newIds])];
                    setUnlockedAchievements(updatedAchievements);

                    newIds.forEach((id, index) => {
                        const achievement = ACHIEVEMENTS[id];
                        if (achievement) {
                            setTimeout(() => {
                                addNotification('success', `Достижение: ${achievement.name}`, achievement.description);
                                AudioEngine.playComplete();
                            }, 500 * (index + 1));
                        }
                    });
                }
            };

                            const handleProgramSave = (newPrograms) => {
                setPrograms(newPrograms);
                localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
                const newAchievementIds = AchievementEngine.check('onProgramSave', { programs: newPrograms }, unlockedAchievements);
                handleNewAchievements(newAchievementIds);
                setIsEditorOpen(false);
                AudioEngine.playBeep();
                addNotification('success', 'Программа сохранена', 'Все изменения успешно сохранены');
            };

                        const handleWorkoutComplete = (result) => {
                // Защита от мусорных мисскликов
                if (result.duration < 60 || result.completedSets.length === 0) {
  addNotification('error', 'Слишком короткая тренировка', 'Пожалуйста, выполните хотя бы 1 подход или потренируйтесь дольше.');
  setActiveWorkout(null);
  localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
  return;
}

                const record = {
                    id: generateId(),
                    date: new Date().toISOString(),
                    programName: activeWorkout.scheduleName,
                    programId: activeWorkout.id,
                    ...result
                };

                const newHistory = [...history, record];
                setHistory(newHistory);

                const newAchievementIds = AchievementEngine.check('onWorkoutComplete', { workoutResult: result, history: newHistory, programs: progressedPrograms }, unlockedAchievements);
                handleNewAchievements(newAchievementIds);

                setActiveWorkout(null);
                localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);

                addNotification('success', 'Тренировка завершена', `Отличная работа!`);
                
                // Проверка пост-тренировочных напоминаний
                const pendingPost = reminders.filter(r => r.trigger === 'post_workout' && r.lastCompleted !== new Date().toDateString());
                if (pendingPost.length > 0) {
                    pendingPost.forEach((r, idx) => {
                        setTimeout(() => addNotification('warning', '💊 Время добавок!', `Не забудьте: ${r.title} (${r.dosage})`), 1500 + (idx * 1000));
                    });
                }

                                // Пересчитываем статусы (сбрасываем "Каждую тренировку" и удаляем "Разовые")
                setReminders(prev => {
                    const today = new Date().toDateString();
                    return prev.filter(r => {
                        if (r.frequency === 'once' && pendingPost.find(p => p.id === r.id)) return false;
                        return true;
                    }).map(r => {
                        // Если every_workout и уже принято сегодня – не сбрасываем
                        if (r.frequency === 'every_workout' && r.lastCompleted === today) return r;
                        if (r.frequency === 'every_workout') return { ...r, lastCompleted: null };
                        if (pendingPost.find(p => p.id === r.id)) return { ...r, lastCompleted: today };
                        return r;
                    });
                });

                if (settings.enableVibration && 'vibrate' in navigator) {
                    navigator.vibrate([200, 100, 200]);
                }
            };

                                    const handleDeleteProgram = (programId) => {
                setPrograms(prev => prev.filter(p => p.id !== programId));
                try {
                    const draftStr = localStorage.getItem(`flexcode_draft_${activeWorkspaceId}`);
                    if (draftStr) {
                        const draft = JSON.parse(draftStr);
                        if (draft && draft.workout && draft.workout.id === programId) {
                            localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
                            if (activeWorkout && activeWorkout.id === programId) setActiveWorkout(null);
                        } 
                    }
                } catch (e) {}
                addNotification('info', 'Программа удалена', 'Программа была успешно удалена');
            };

            const addNotification = (type, title, message) => {
                const id = generateId();
                setNotifications(prev => [...prev, { id, type, title, message }]);
            };

            const removeNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            const handleSettingsChange = (newSettings) => {
                setSettings(newSettings);
                const newAchievementIds = AchievementEngine.check('onSettingsChange', {}, unlockedAchievements);
                handleNewAchievements(newAchievementIds);
                addNotification('success', 'Настройки сохранены', 'Все настройки успешно обновлены');
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-dark flex flex-col items-center justify-center">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-indigo-400 font-medium">Загрузка...</p>
                    </div>
                );
            }

            return (
                <ErrorBoundary>
                    <div className="min-h-screen safe-pb pb-24 relative">
                        {/* Уведомления */}
                        {notifications.map(notification => (
                            <Notification
                                key={notification.id}
                                {...notification}
                                onClose={() => removeNotification(notification.id)}
                            />
                        ))}

                        {/* Верхняя панель */}
                        <div className="sticky top-0 z-30 px-6 py-4 glass-header flex justify-between items-center safe-pt">
                                                        <div className="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setIsWorkspaceManagerOpen(true)}>
                                <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                    <Icon name="dumbbell" className="text-white" size={18} />
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-bold text-lg tracking-tight text-white leading-none">FlexCode<span className="text-indigo-500">Pro</span></span>
                                    <span className="text-[10px] text-gray-400 font-medium uppercase tracking-wider flex items-center gap-1 mt-1">
                                        {workspaces.find(w => w.id === activeWorkspaceId)?.name} <Icon name="chevron-down" size={10}/>
                                    </span>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsEditorOpen(true)} className="p-2 rounded-lg bg-surface border border-white/10 text-gray-300 hover:text-white hover:border-indigo-500/50 transition-all">
                                    <Icon name="edit-3" size={20} />
                                </button>
                                <button onClick={() => setView('stats')} className="p-2 rounded-lg bg-surface border border-white/10 text-gray-300 hover:text-white hover:border-indigo-500/50 transition-all">
                                    <Icon name="bar-chart-2" size={20} />
                                </button>
                                <button onClick={() => setIsAchievementsOpen(true)} className="p-2 rounded-lg bg-surface border border-white/10 text-gray-300 hover:text-white hover:border-yellow-500/50 transition-all relative">
                                    <Icon name="trophy" size={20} />
                                    {unlockedAchievements.length > 0 && <span className="absolute -top-1 -right-1 w-4 h-4 bg-yellow-500 text-black text-[10px] font-bold rounded-full flex items-center justify-center">{unlockedAchievements.length}</span>}
                                </button>
                            </div>
                        </div>

                        {/* Основной контент */}
                        <div className="p-4 sm:p-6 max-w-2xl mx-auto">
                            {view === 'schedule' && (
                                <ScheduleView
                                    programs={progressedPrograms}
                                    history={history}
    workspaceId={activeWorkspaceId}
                                    onSelectProgram={(program) => {
                                        const progressedVersion = progressedPrograms.find(p => p.id === program.id);
                                        setSelectedProgram(progressedVersion || program);
                                    }}
                                    onDeleteProgram={handleDeleteProgram}
                                />
                            )}

                            {view === 'stats' && (
                                <StatsDashboard history={history}
    workspaceId={activeWorkspaceId} programs={progressedPrograms} />
                            )}

                            {view === 'reminders' && (
                                <RemindersView reminders={reminders} setReminders={setReminders} />
                            )}

                            {view === 'programs' && (
                                <div className="animate-slide-up">
                                    <h2 className="text-2xl font-bold text-white mb-6">Все программы</h2>
                                    <div className="space-y-4">
                                        {programs.map(program => (
                                            <Card key={program.id} hover>
                                                <div className="flex items-center justify-between">
                                                    <div
                                                        className="flex-1 cursor-pointer"
                                                        onClick={() => setSelectedProgram(program)}
                                                    >
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <div
                                                                className="w-3 h-3 rounded-full"
                                                                style={{ backgroundColor: program.color }}
                                                            ></div>
                                                            <h4 className="font-bold text-white">{program.scheduleName}</h4>
                                                        </div>
                                                        <p className="text-sm text-gray-500">{program.exercises.length} упражнений • {program.dayOfWeek}</p>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={() => setSelectedProgram(program)}
                                                            className="p-2 bg-indigo-500/20 text-indigo-400 rounded-lg hover:bg-indigo-500/30"
                                                        >
                                                            <Icon name="eye" size={16} />
                                                        </button>
                                                        <button
                                                            onClick={() => {
                                                                if (confirm('Удалить эту программу?')) {
                                                                    handleDeleteProgram(program.id);
                                                                }
                                                            }}
                                                            className="p-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30"
                                                        >
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    </div>
                                                </div>
                                            </Card>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Нижняя навигация */}
                        <div className="fixed bottom-0 w-full glass-panel border-t border-white/5 pb-[env(safe-area-inset-bottom)] z-40">
                            <div className="flex justify-around items-center h-16 max-w-lg mx-auto">
                                <button onClick={() => setView('schedule')} className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'schedule' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                    <Icon name="calendar" size={22} className={view === 'schedule' ? 'stroke-[2.5px]' : ''} />
                                    <span className="text-[10px] font-medium">Расписание</span>
                                </button>
                                <button onClick={() => setView('programs')} className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'programs' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                    <Icon name="list" size={22} className={view === 'programs' ? 'stroke-[2.5px]' : ''} />
                                    <span className="text-[10px] font-medium">Программы</span>
                                </button>
                                <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'stats' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                    <Icon name="bar-chart-2" size={22} className={view === 'stats' ? 'stroke-[2.5px]' : ''} />
                                    <span className="text-[10px] font-medium">Статистика</span>
                                </button>
                                <button onClick={() => setView('reminders')} className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'reminders' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                    <Icon name="bell" size={22} className={view === 'reminders' ? 'stroke-[2.5px]' : ''} />
                                    <span className="text-[10px] font-medium">Добавки</span>
                                </button>
                            </div>
                        </div>

                        {/* --- Модальные окна --- */}
                        <Modal isOpen={isEditorOpen} onClose={() => setIsEditorOpen(false)} title="Редактор JSON">
                            <JsonEditor
                                initialData={programs}
                                onSave={handleProgramSave}
                                onClose={() => setIsEditorOpen(false)}
                            />
                        </Modal>

                        {selectedProgram && (
                            <ProgramDetailView
                                program={selectedProgram}
                                onClose={() => setSelectedProgram(null)}
                                onStartWorkout={(workout) => { localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`); setActiveWorkout(workout); }}
                                reminders={reminders}
                                setReminders={setReminders}
                                onEdit={() => {
                                    setSelectedProgram(null);
                                    setIsEditorOpen(true);
                                }}
                            />
                        )}

                                                                        {activeWorkout && (
                            <WorkoutPlayer
                                workout={activeWorkout}
                                initialDraft={JSON.parse(localStorage.getItem(`flexcode_draft_${activeWorkspaceId}`) || 'null')}
                                onClose={() => { setActiveWorkout(null); localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`); }}
                                onComplete={handleWorkoutComplete}
                                settings={settings}
                                onSettingsChange={handleSettingsChange}
                                history={history}
    workspaceId={activeWorkspaceId}
                            />
                        )}

                                                <AchievementsModal
                            isOpen={isAchievementsOpen}
                            onClose={() => setIsAchievementsOpen(false)}
                            unlockedIds={unlockedAchievements}
                        />

                                                                                <WorkspaceManagerModal
                            isOpen={isWorkspaceManagerOpen}
                            onClose={() => setIsWorkspaceManagerOpen(false)}
                            workspaces={workspaces}
                            activeId={activeWorkspaceId}
                            onSwitch={(id) => { setActiveWorkspaceId(id); setActiveWorkout(null); localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`); }}
                            onCreate={handleCreateWorkspace}
                            onDelete={handleDeleteWorkspace}
                            onRename={handleRenameWorkspace}
                        />
                    </div>
                </ErrorBoundary>
            );
        };

                // Рендеринг приложения
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('PWA Ready'));
        }
    </script>
</body>

</html>
