        .glass-header {

        /* Анимации текста */
        .gradient-text {

            background-clip: text;

        /* Индикатор прогресса (круг) */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Стили для редактора кода */
        .code-editor {
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.5;
            tab-size: 2;
        }

        .code-editor textarea {
            caret-color: #818cf8;
        }

        /* Ripple эффект для кнопок */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }

        .ripple:active:after {
            transform: scale(0, 0);
            opacity: .2;
            transition: 0s;
        }

        /* Утилиты для iOS */
        .safe-pb {
            padding-bottom: calc(1rem + var(--safe-area-bottom));
        }

        .safe-pt {
            padding-top: calc(1rem + var(--safe-area-top));
        }

        /* Защита от выделения текста во время тренировки */
        .noselect {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* Анимация таймера */
        @keyframes timer-pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
                color: #818cf8;
            }

            100% {
                transform: scale(1);
            }
        }

        .timer-tick {
            animation: timer-pop 0.2s ease-out;
        }

        /* Горизонтальный прогресс-бар */
        .progress-bar {
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
        }

        /* Анимация подсветки */
        @keyframes highlight {
            0% {
                background-color: rgba(99, 102, 241, 0.1);
            }

            50% {
                background-color: rgba(99, 102, 241, 0.3);
            }

            100% {
                background-color: rgba(99, 102, 241, 0.1);
            }
        }

        .highlight-current {
            animation: highlight 2s ease-in-out infinite;
            border-left: 4px solid #6366f1;
        }

        /* Вибрация для мобильных устройств */
        @media (max-width: 768px) {
            .vibrate {
                animation: shake 0.5s;
            }
        }

        /* Сетка расписания */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .schedule-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .schedule-day.active {
            background: #6366f1;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .schedule-day.rest-day {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }

        .schedule-day.has-workout {
            background: rgba(99, 102, 241, 0.2);
            border: 2px solid #6366f1;
            color: white;
        }

        /* Карточка упражнения */
        .exercise-card {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .exercise-card:hover {
            transform: translateX(4px);
            border-left-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        .exercise-card.active {
            background: rgba(99, 102, 241, 0.1);
            border-left-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        /* Адаптивные стили */
        @media (max-width: 640px) {
            .mobile-hidden {
                display: none;
            }

            .mobile-full {
                width: 100%;
            }
        }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
            max-width: 320px;
        }

        /* Градиент для графиков */
        .chart-gradient {
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.2) 0%, rgba(99, 102, 241, 0) 100%);
        }

        /* Индикатор стрика */
        .streak-indicator {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>

    <script type="text/babel">
        /**

        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

        // --- КОНТЕКСТЫ И КОНСТАНТЫ ---
        const SettingsContext = createContext();
        const ACHIEVEMENTS = {
            // Категория: Начало пути

            bodyweight_master: { name: "Легкость бытия", description: "Провести тренировку только с собственным весом.", icon: "feather" },

            // Категория: Выносливость и Время
            marathoner: { name: "Марафонец", description: "Тренировка длилась более 90 минут.", icon: "timer" },
            sprinter: { name: "Спринтер", description: "Завершить тренировку (3+ упр.) быстрее 20 минут.", icon: "zap" },
            endurance_king: { name: "Терпение", description: "Суммарное время тренировок превысило 24 часа.", icon: "battery-full" },
            high_rep: { name: "На повторе", description: "Выполнить 20+ повторений за один подход.", icon: "infinity" },

            // Категория: Режим
            lark: { name: "Жаворонок", description: "Завершить тренировку до 8:00 утра.", icon: "sunrise" },
            night_owl: { name: "Ночная сова", description: "Завершить тренировку после 23:00.", icon: "moon" },
            lunch_break: { name: "Обеденный перерыв", description: "Завершить тренировку между 12:00 и 14:00.", icon: "sandwich" },

            // Категория: Разнообразие
            versatile: { name: "Универсал", description: "Выполнить 3 разные программы тренировок.", icon: "git-fork" },
            full_body: { name: "Фулбади", description: "Использовать 5 разных видов оборудования за тренировку.", icon: "boxes" },
            editor_master: { name: "Мастер редактирования", description: "Создать программу с 7+ упражнениями.", icon: "list-plus" },

            // Категория: Хардкор и Секретные
            to_failure: { name: "До отказа", description: "Выполнить подход на время дольше 2 минут.", icon: "hourglass" },
            two_a_day: { name: "Второе дыхание", description: "Выполнить 2 тренировки за один день.", icon: "wind" },
            no_pauses: { name: "Ни шагу назад", description: "Не нажать 'Пауза' за всю тренировку.", icon: "shield-check" },
            perfect_discipline: { name: "Дисциплина", description: "Не пропустить ни одной тренировки по расписанию за 4 недели.", icon: "target" },
            grandmaster: { name: "Гроссмейстер", description: "Собрать 20 любых достижений.", icon: "gem" },
            new_year_new_me: { name: "Новый год, новый я", description: "Завершить тренировку 1 или 2 января.", icon: "sparkles" },
            beta_tester: { name: "Бета-тестер", description: "Вы нашли это секретное достижение!", icon: "bug" },
            century_club: { name: "Клуб 100", description: "Завершить 100 тренировок.", icon: "award" },
            early_bird: { name: "Ранняя пташка", description: "Начать тренировку до 6:00 утра.", icon: "bird" },
            restless: { name: "Неутомимый", description: "Суммарное время тренировок превысило 100 часов.", icon: "flame" },
            heavy_lifter: { name: "Богатырь", description: "Поднять 20,000 кг за одну тренировку.", icon: "mountain" },
            flex_code_elite: { name: "FlexCode Elite", description: "Получить все остальные достижения.", icon: "star" },
        };
        const AchievementEngine = {
            /**
             * Проверяет, какие новые достижения были разблокированы.
             * @param {string} trigger - Событие, вызвавшее проверку (e.g., 'onWorkoutComplete').
             * @param {object} data - Данные, необходимые для проверки (history, programs, etc.).
             * @param {string[]} unlockedIds - Массив ID уже разблокированных достижений.
             * @returns {string[]} - Массив ID новых разблокированных достижений.
             */
            check: (trigger, data, unlockedIds) => {
                const newAchievements = [];
                for (const id in ACHIEVEMENTS) {
                    if (unlockedIds.includes(id)) continue; // Пропускаем уже открытые

                    const checker = AchievementEngine.checkers[id];
                    if (checker && checker.trigger === trigger) {
                        if (checker.condition(data)) {
                            newAchievements.push(id);
                        }
                    }
                }

                // Проверка на мета-ачивки (которые зависят от других ачивок)
                const totalUnlocked = unlockedIds.length + newAchievements.length;
                if (!unlockedIds.includes('grandmaster') && totalUnlocked >= 20) {
                    newAchievements.push('grandmaster');
                }
                if (!unlockedIds.includes('flex_code_elite') && totalUnlocked >= Object.keys(ACHIEVEMENTS).length - 1) {
                    newAchievements.push('flex_code_elite');
                }

                return newAchievements;
            },

            // --- СПИСОК ВСЕХ ПРОВЕРОК ---
            // Мы реализуем несколько для примера. Остальные можно добавить по аналогии.
            checkers: {
                // --- Триггер: onWorkoutComplete ---
                // --- Триггер: onWorkoutComplete ---
                first_step: { trigger: 'onWorkoutComplete', condition: ({ history }) => history.length === 1 },
                tonnage: { trigger: 'onWorkoutComplete', condition: ({ workoutResult, programs }) => { const p = programs.find(pr => pr.id === workoutResult.programId); if (!p) return false; let v = 0; workoutResult.completedSets.forEach(s => { const e = p.exercises.find(ex => ex.id === s.exerciseId); if (e) v += calculateTrainingVolume(e, s); }); return v >= 1000; } },
                trucker: { trigger: 'onWorkoutComplete', condition: ({ workoutResult, programs }) => { const p = programs.find(pr => pr.id === workoutResult.programId); if (!p) return false; let v = 0; workoutResult.completedSets.forEach(s => { const e = p.exercises.find(ex => ex.id === s.exerciseId); if (e) v += calculateTrainingVolume(e, s); }); return v >= 5000; } },
                locomotive: { trigger: 'onWorkoutComplete', condition: ({ workoutResult, programs }) => { const p = programs.find(pr => pr.id === workoutResult.programId); if (!p) return false; let v = 0; workoutResult.completedSets.forEach(s => { const e = p.exercises.find(ex => ex.id === s.exerciseId); if (e) v += calculateTrainingVolume(e, s); }); return v >= 10000; } },
                heavy_lifter: { trigger: 'onWorkoutComplete', condition: ({ workoutResult, programs }) => { const p = programs.find(pr => pr.id === workoutResult.programId); if (!p) return false; let v = 0; workoutResult.completedSets.forEach(s => { const e = p.exercises.find(ex => ex.id === s.exerciseId); if (e) v += calculateTrainingVolume(e, s); }); return v >= 20000; } },
                bodyweight_master: { trigger: 'onWorkoutComplete', condition: ({ workoutResult }) => { if (!workoutResult.completedSets || workoutResult.completedSets.length === 0) return false; return workoutResult.completedSets.every(s => { const w = String(s.weight || '').replace(/[^0-9.]/g, ''); return !w || parseFloat(w) === 0; }); } },
                lark: { trigger: 'onWorkoutComplete', condition: () => new Date().getHours() < 8 },
                early_bird: { trigger: 'onWorkoutComplete', condition: () => new Date().getHours() < 6 },
                night_owl: { trigger: 'onWorkoutComplete', condition: () => new Date().getHours() >= 23 || new Date().getHours() < 4 },
                lunch_break: { trigger: 'onWorkoutComplete', condition: () => new Date().getHours() >= 12 && new Date().getHours() <= 14 },
                marathoner: { trigger: 'onWorkoutComplete', condition: ({ workoutResult }) => workoutResult.duration >= 90 * 60 },
                sprinter: { trigger: 'onWorkoutComplete', condition: ({ workoutResult }) => workoutResult.duration < 20 * 60 && workoutResult.sets >= 3 },
                two_a_day: { trigger: 'onWorkoutComplete', condition: ({ history }) => { if (history.length < 2) return false; const lastTwo = history.slice(-2); return new Date(lastTwo[0].date).toDateString() === new Date(lastTwo[1].date).toDateString(); } },
                heavyweight: { trigger: 'onWorkoutComplete', condition: ({ workoutResult }) => workoutResult.completedSets.some(s => parseFloat(String(s.weight).replace(/[^0-9.]/g, '')) >= 100) },
                no_absenteeism: { trigger: 'onWorkoutComplete', condition: ({ history }) => { const d = history.map(h => new Date(h.date).toDateString()); return Array.from({length: 7}, (_, i) => new Date(Date.now() - i * 86400000).toDateString()).every(x => d.includes(x)); } },
                perfect_discipline: { trigger: 'onWorkoutComplete', condition: ({ history }) => calculateStreak(history) >= 4 },
                warm_up: { trigger: 'onWorkoutComplete', condition: ({ history }) => history.reduce((acc, curr) => acc + (curr.sets || 0), 0) >= 50 },

        // --- AUDIO ENGINE (WEB AUDIO API) ---
        const AudioEngine = {
            ctx: null,
            gainNode: null,
            initialized: false,

            init() {
                if (this.initialized) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                    this.gainNode = this.ctx.createGain();
                    this.gainNode.connect(this.ctx.destination);
                    this.initialized = true;
                } catch (e) {
                    console.error("Web Audio API not supported", e);
                }
            },

            playTone(freq, type, duration, volume = 0.5) {
                if (!this.initialized) this.init();
                if (!this.ctx) return;

                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);

                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },

            playBeep() { this.playTone(800, 'sine', 0.1, 0.3); },
            playStart() { this.playTone(1200, 'square', 0.15, 0.4); },
            playCountdown() { this.playTone(600, 'triangle', 0.1, 0.3); },

            // Надежный парсинг веса (обрабатывает запятые и лишние символы)
            const weightStr = String(w).replace(/,/g, '.').replace(/[^0-9.]/g, '');

                        // Дневной стрик (для достижений)
        const calculateDailyStreak = (history) => {
            if (!history || history.length === 0) return 0;
            const dates = [...new Set(history.map(h => new Date(h.date).toDateString()))];
            if (!dates.includes(new Date().toDateString()) && !dates.includes(new Date(Date.now() - 86400000).toDateString())) return 0;
            let streak = 0;
            let current = new Date();
            if (!dates.includes(current.toDateString())) current.setDate(current.getDate() - 1);
            while (dates.includes(current.toDateString())) {
                streak++;
                current.setDate(current.getDate() - 1);
            }
            return streak;
        };

        const calculateStreak = (history) => {
            if (!history || history.length === 0) return 0;
            
            // Получаем уникальные недели тренировок (приводим даты к понедельнику)
            const weeks = [...new Set(history.map(h => {
                const d = new Date(h.date);
                const day = d.getDay() || 7;
                d.setHours(-24 * (day - 1), 0, 0, 0);
                return d.getTime();
            }))].sort((a, b) => b - a);

            if (weeks.length === 0) return 0;

            const now = new Date();
            const currentDay = now.getDay() || 7;
            now.setHours(-24 * (currentDay - 1), 0, 0, 0);
            const currentWeekTime = now.getTime();
            const msInWeek = 7 * 24 * 60 * 60 * 1000;

            // Если последняя треня была раньше прошлой недели - стрик мертв
            if (currentWeekTime - weeks[0] > msInWeek) return 0;

            let streak = 0;
            let expectedWeek = weeks[0];

            for (let i = 0; i < weeks.length; i++) {
                if (weeks[i] === expectedWeek) {
                    streak++;
                    expectedWeek -= msInWeek;
                } else {
                    break;
                }
            }
            return streak;
        };
        const calculateProgression = (program, history) => {
            if (!history || history.length === 0) return program;
            const relevantHistory = history.filter(h => h.programId === program.id);
            if (relevantHistory.length === 0) return program;

            const newProgram = JSON.parse(JSON.stringify(program));

            newProgram.exercises.forEach(exercise => {
                if (!exercise.progression) return;
                const { type, increment = (exercise.progression.type === 'weight' || exercise.progression.type === 'double' ? 2.5 : 1) } = exercise.progression;
                if (String(exercise.reps).toLowerCase() === 'max' || String(exercise.weight).toUpperCase() === 'BW' || String(exercise.weight) === '0kg') return;

                const allPastSessions = [];
                relevantHistory.forEach(h => {
                    if (h.completedSets) {
                        const sets = h.completedSets.filter(s => s.exerciseId === exercise.id);
                        if (sets.length > 0) allPastSessions.push({ date: h.date, sets });
                    }
                });

                if (allPastSessions.length === 0) return;

                const lastSession = allPastSessions[allPastSessions.length - 1];
                const lastSets = lastSession.sets;

                let lastWeight = 0;
lastSets.forEach(s => {
  const w = parseFloat(String(s.weight).replace(/[^0-9.]/g, ''));
  if (w > lastWeight) lastWeight = w;
});
                if (isNaN(lastWeight)) lastWeight = parseFloat(String(exercise.weight).replace(/[^0-9.]/g, '')) || 0;

                // Оценка RPE
                let maxRpe = 0;
                lastSets.forEach(s => {
                    const r = parseInt(s.rpe);
                    if (!isNaN(r) && r > maxRpe) maxRpe = r;
                });
                const isHighRpe = maxRpe >= 9;

                exercise.hasProgression = false;
                const threshold = exercise.progression.threshold || 1;

                if (type === 'double') {
                    const lowerBound = parseInt(String(exercise.reps).split('-')[0].trim()) || 0;
                    const upperBound = parseInt(String(exercise.reps).split('-')[1]?.trim() || lowerBound);
                    
                    const recentSetsForFail = lastSets.slice(-exercise.sets);
                    const isFail = recentSetsForFail.some(s => parseInt(s.reps) < lowerBound);
                    const recentSets = lastSets.slice(-exercise.sets);
                    const isSuccess = recentSets.length === exercise.sets && recentSets.every(s => parseInt(s.reps) >= upperBound);

                    if (isSuccess) {
                        if (isHighRpe) {
                            exercise.weight = `${lastWeight}kg`;
                            exercise.progressionText = `Удержание (Высокий RPE: ${maxRpe}) ⚠️`;
                        } else {
                            let streak = 0;
                            for (let i = allPastSessions.length - 1; i >= 0; i--) {
                                if (allPastSessions[i].sets.length >= exercise.sets && allPastSessions[i].sets.every(s => parseInt(s.reps) >= upperBound)) streak++;
                                else break;
                            }
                            if (streak >= threshold) {
                                exercise.weight = `${lastWeight + increment}kg`;
                                exercise.reps = String(lowerBound) + (String(exercise.reps || '').includes('-') ? '-' + String(upperBound) : '');
                                exercise.progressionText = `+${increment}кг (Цель взята!) 📈`;
                                exercise.hasProgression = true;
                            } else {
                                exercise.weight = `${lastWeight}kg`;
                                if (threshold > 1) {
                                    exercise.progressionText = `Закрепление ${streak}/${threshold} ⏳`;
                                    exercise.hasProgression = true;
                                }
                            }
                        }
                    } else if (isFail) {
                        let failStreak = 0;
                        for (let i = allPastSessions.length - 1; i >= 0; i--) {
                            if (allPastSessions[i].sets.some(s => parseInt(s.reps) < lowerBound)) failStreak++;
                            else break;
                        }
                        const deloadThreshold = exercise.progression.deloadThreshold || 2;
                        if (failStreak >= deloadThreshold) {
                            const newW = Math.round((lastWeight * 0.9) * 10) / 10;
                            exercise.weight = `${newW}kg`;
                            exercise.progressionText = `Откат веса -10% 📉`;
                            exercise.hasProgression = true;
                        } else {
                            exercise.weight = `${lastWeight}kg`;
                            exercise.progressionText = `Неудача ${failStreak}/${deloadThreshold} ⚠️`;
                        }
                    } else {
                        exercise.weight = `${lastWeight}kg`;
                        exercise.progressionText = `Внутри цикла (${lowerBound}-${upperBound})`;
                    }
                } else if (type === 'weight') {
                    const deloadThreshold = exercise.progression.deloadThreshold || 3;
                    const deloadPercent = exercise.progression.deloadPercent || 10;
                    let successStreak = 0;
                    let failStreak = 0;
                    
                    for (let i = allPastSessions.length - 1; i >= 0; i--) {
                        const recentSets2 = allPastSessions[i].sets.slice(-exercise.sets);
                        const allSetsMet = recentSets2.length === exercise.sets && recentSets2.every(s => {
                            let actualW = parseFloat(String(s.weight).replace(/[^0-9.]/g, ''));
                            let actualReps = parseInt(s.reps) || 0;
                            let targetReps = parseInt(String(exercise.reps).split('-')[0].trim()) || 0;
                            return actualW >= lastWeight && actualReps >= targetReps;
                        });

                        if (allSetsMet) {
                            successStreak++; failStreak = 0;
                        } else {
                            failStreak++; successStreak = 0;
                        }
                    }

                    if (failStreak >= deloadThreshold) {
                        let newW = lastWeight * (1 - (deloadPercent / 100));
                        newW = Math.round(newW * 10) / 10;
                        exercise.weight = `${newW}kg`;
                        exercise.progressionText = `Разгрузка -${deloadPercent}% 📉`;
                        exercise.hasProgression = true;
                    } else if (successStreak >= threshold) {
                        if (isHighRpe) {
                            exercise.weight = `${lastWeight}kg`;
                            exercise.progressionText = `Удержание (Высокий RPE) ⚠️`;
                        } else {
                            exercise.weight = `${lastWeight + increment}kg`;
                            exercise.progressionText = `+${increment}кг 📈`;
                            exercise.hasProgression = true;
                        }
                    } else {
                        exercise.weight = `${lastWeight}kg`;
                        if (threshold > 1) {
                            exercise.progressionText = `Закрепление ${successStreak}/${threshold} ⏳`;
                            exercise.hasProgression = true;
                        }
                    }
                } else if ((type === 'reps' && exercise.reps !== 'Max') || type === 'time') {
                    let streak = 0;
                    for (let i = allPastSessions.length - 1; i >= 0; i--) {
                        let target = type === 'time' ? (parseInt(exercise.timer) || 0) : (parseInt(String(exercise.reps).split('-')[0].trim()) || 0);
                        const recentSets3 = allPastSessions[i].sets.slice(-exercise.sets);
                            const allSetsMet = recentSets3.length === exercise.sets && recentSets3.every(s => parseInt(s.reps) >= target);
                        if (allSetsMet) streak++; else break;
                    }
                    if (streak >= threshold && !isHighRpe) {
                        const nextVal = (type === 'time' ? parseInt(exercise.timer) : parseInt(String(exercise.reps).split('-')[0].trim())) + increment;
                        if (type === 'time') {
                            exercise.timer = nextVal;
                        } else {
                            const currentReps = String(exercise.reps);
                            if (currentReps.includes('-')) {
                                const parts = currentReps.split('-').map(s => s.trim());
                                const lower = parseInt(parts[0]) + increment;
                                const upper = parseInt(parts[1]) + increment;
                                exercise.reps = `${lower}-${upper}`;
                            } else {
                                exercise.reps = String(nextVal);
                            }
                        }
                        exercise.progressionText = `+${increment}${type === 'time' ? 'с' : ' повт'} 📈`;
                        exercise.hasProgression = true;
                    } else {
                        if (threshold > 1 || isHighRpe) {
                            exercise.progressionText = isHighRpe ? `Удержание (RPE) ⚠️` : `Закрепление ${streak}/${threshold} ⏳`;
                            exercise.hasProgression = true;
                        }
                    }
                }
            });
            return newProgram;
        };

        // Error Boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {

            }

                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen bg-dark text-white p-6 text-center">

                try {
                    const parsed = JSON.parse(code);

                                        if (!Array.isArray(parsed)) throw new Error("Корень должен быть массивом (Array)");
                    const ids = parsed.map(p => p.id).filter(Boolean);
                    if (ids.some((val, i) => ids.indexOf(val) !== i)) throw new Error("Найдены дублирующиеся ID программ. Все ID должны быть уникальными.");

                    parsed.forEach((prog, i) => {
                        if (!prog.scheduleName) throw new Error(`Программа #${i + 1}: Нет названия (scheduleName)`);
                        if (!prog.exercises || !Array.isArray(prog.exercises)) throw new Error(`Программа #${i + 1}: Нет упражнений (Array)`);

                        if (!prog.id) prog.id = generateId();

                        prog.exercises.forEach((ex, j) => {
                            if (!ex.name) throw new Error(`Программа "${prog.scheduleName}", Упр #${j + 1}: Нет названия`);
                            if (!ex.id) ex.id = generateId();
                            if (!ex.type) ex.type = 'reps';

                                                    value={actualWeight}

                                                        let val = e.target.value.replace(/,/g, '.').replace(/[^0-9.]/g, '');

                                                            setActualWeight(val);
                                                            setCompletedSets(prev => {

                                                                let lastIdx = -1;
                                                                for(let i=newSets.length-1; i>=0; i--) if(newSets[i].exerciseId===exercise.id) { lastIdx=i; break; }
                                                                if(lastIdx !== -1) newSets[lastIdx].weight = val ? `${val}kg` : '0kg';
                                                                return newSets;

                                                    onClick={(e)=>e.target.select()}
                                                />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-xs text-gray-400 uppercase font-bold mb-1 block text-center">{exercise.type === 'time' ? 'Время (с)' : 'Повторы'}</label>
                                                <input
                                                    type="text"
                                                    inputMode="numeric"
                                                    className="w-full bg-dark/50 border border-white/10 rounded-xl p-3 text-white text-center text-xl font-bold focus:border-indigo-500 outline-none transition-colors"
                                                    value={actualReps}
                                                    onChange={(e) => {
                                                        let val = e.target.value.replace(/[^0-9]/g, '');
                                                        if (val === '' || parseInt(val) >= 0) {
                                                            setActualReps(val);
                                                            setCompletedSets(prev => {
                                                                const newSets = [...prev];
                                                                let lastIdx = -1;
                                                                for(let i=newSets.length-1; i>=0; i--) if(newSets[i].exerciseId===exercise.id) { lastIdx=i; break; }
                                                                if(lastIdx !== -1) newSets[lastIdx].reps = val;
                                                                return newSets;
                                                            });

                                                                if(lastIdx !== -1) newSets[lastIdx].rpe = val;

                                    <span className="text-6xl font-black text-white">{exercise.reps}</span>

                    </div>

                    {/* Модальное окно настроек */}
                    <PlayerSettingsModal
                        isOpen={showSettings}
                        onClose={() => setShowSettings(false)}
                        settings={settings}
                        onSettingsChange={onSettingsChange}

                    />
                </div>
            );
        };

        // 4. СТАТИСТИКА И АНАЛИТИКА
        const StatsDashboard = ({ history, programs }) => {
            const [timeRange, setTimeRange] = useState('week');
            const [selectedExerciseId, setSelectedExerciseId] = useState('');
            const chartRef = useRef(null);
            const volumeChartRef = useRef(null);
                        const [chartInstance, setChartInstance] = useState(null);
            const [volumeChartInstance, setVolumeChartInstance] = useState(null);

            const allExercises = useMemo(() => {
                const map = new Map();
                history.forEach(h => {
                    if(h.completedSets) h.completedSets.forEach(s => map.set(s.exerciseName, s.exerciseName));
                });
                return Array.from(map.values()).sort();
            }, [history]);
            
            useEffect(() => {
                if(!selectedExerciseId && allExercises.length > 0) setSelectedExerciseId(allExercises[0]);
            }, [allExercises, selectedExerciseId]);

            // Защита от пустого массива программ
            const safePrograms = programs || [];
            const safeHistory = history || [];

            // Расчет статистики
            const totalWorkouts = history.length;
            const totalSets = history.reduce((acc, curr) => acc + (curr.sets || 0), 0);
            const totalDuration = history.reduce((acc, curr) => acc + (curr.duration || 0), 0);
            const averageDuration = totalWorkouts > 0 ? Math.round(totalDuration / totalWorkouts) : 0;
            const streak = calculateDailyStreak(history);

            // Расчет тренировочного объема
            const trainingVolume = useMemo(() => {
                                let volume = 0;
                safeHistory.forEach(record => {
                    const program = safePrograms.find(p => p.scheduleName === record.programName);
                    if (program && record.completedSets) {
                        record.completedSets.forEach(set => {
                            const exercise = program.exercises.find(e => e.id === set.exerciseId);
                            if (exercise) {
                                volume += calculateTrainingVolume(exercise, set);
                            }
                        });
                    }
                });
                return Math.round(volume);
            }, [history, programs]);

            // Подготовка данных для графиков
            useEffect(() => {
                if (!chartRef.current || !history.length) return;

                const ctx = chartRef.current.getContext('2d');
                if (chartInstance) chartInstance.destroy();

                // Фильтрация данных по выбранному периоду
                let filteredHistory = [...history];
                const now = new Date();

                if (timeRange === 'week') {
                    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    filteredHistory = history.filter(h => new Date(h.date) >= weekAgo);
                } else if (timeRange === 'month') {
                    const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                    filteredHistory = history.filter(h => new Date(h.date) >= monthAgo);
                }

                // Группировка по дням
                const groupedData = {};
                filteredHistory.forEach(h => {
                    const date = new Date(h.date).toLocaleDateString('ru-RU', { month: 'short', day: 'numeric' });
                    if (!groupedData[date]) {
                        groupedData[date] = { sets: 0, workouts: 0 };
                    }
                    groupedData[date].sets += h.sets || 0;
                    groupedData[date].workouts += 1;
                });

                const labels = Object.keys(groupedData);
                const setsData = labels.map(label => groupedData[label].sets);
                const workoutsData = labels.map(label => groupedData[label].workouts);

                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: 'Подходы',
                                data: setsData,
                                borderColor: '#6366f1',
                                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                                tension: 0.4,
                                fill: true,
                                yAxisID: 'y'
                            },
                            {
                                label: 'Тренировки',
                                data: workoutsData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                tension: 0.4,
                                fill: false,
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: {
                                display: true,
                                labels: {
                                    color: '#94a3b8',
                                    font: {
                                        family: "'Inter', sans-serif"
                                    }
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                titleColor: '#e2e8f0',
                                bodyColor: '#cbd5e1',
                                borderColor: '#334155',
                                borderWidth: 1
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#94a3b8',
                                    font: {
                                        family: "'Inter', sans-serif"
                                    }
                                }
                            },
                                                        y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                suggestedMax: 5,
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#94a3b8',
                                    precision: 0,
                                    font: {
                                        family: "'Inter', sans-serif"
                                    }
                                }
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                suggestedMax: 2,
                                grid: {
                                    drawOnChartArea: false,
                                },
                                ticks: {
                                    color: '#10b981',
                                    precision: 0,
                                    font: {
                                        family: "'Inter', sans-serif"
                                    }
                                }
                            }
                        }
                    }
                });

                setChartInstance(chart);

                return () => chart.destroy();
            }, [history, timeRange]);

            // График тренировочного объема
                useEffect(() => {
        if (!volumeChartRef.current || !history.length) return;

        const ctx = volumeChartRef.current.getContext('2d');
        if (volumeChartInstance) volumeChartInstance.destroy();

        // Фильтруем историю по выбранному упражнению
        const exHistory = history.filter(h => h.completedSets && h.completedSets.some(s => s.exerciseName === selectedExerciseId));
        const last10Workouts = [...exHistory].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 10).reverse();

        if (last10Workouts.length === 0) {
            setVolumeChartInstance(null);
            return;
        }

        const labels = last10Workouts.map(h => new Date(h.date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }));
        const volumeData = last10Workouts.map(h => {
            let max1RM = 0;
            h.completedSets.filter(s => s.exerciseName === selectedExerciseId && s.type !== 'time' && s.weight && !String(s.weight).toUpperCase().includes('BW')).forEach(set => {
                const w = parseFloat(String(set.weight).replace(/[^0-9.]/g, '')) || 0;
                const r = parseInt(String(set.reps).split('-')[0]) || 0;
                const e1rm = w * (1 + r / 30);
                if (e1rm > max1RM) max1RM = e1rm;
            });
            return Math.round(max1RM);
        });

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Макс. e1RM (кг)',
                    data: volumeData,
                    backgroundColor: 'rgba(234, 179, 8, 0.2)',
                    borderColor: 'rgba(234, 179, 8, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#eab308',
                    pointRadius: 4,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMax: 20,
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        },
                        ticks: {
                            color: '#94a3b8',
                            precision: 0
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#94a3b8'
                        }
                    }
                }
            }
        });

        setVolumeChartInstance(chart);

        return () => chart.destroy();
    }, [history, programs, selectedExerciseId]);

            return (
                <div className="animate-slide-up">
                    {/* Статистика вверху */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <Card className="flex flex-col items-center justify-center py-6">
                            <Icon name="trophy" className="text-yellow-500 mb-2" size={32} />
                            <span className="text-3xl font-bold text-white">{totalWorkouts}</span>
                            <span className="text-xs text-gray-400 uppercase tracking-wider">Тренировок</span>
                        </Card>
                        <Card className="flex flex-col items-center justify-center py-6">
                            <Icon name="activity" className="text-green-500 mb-2" size={32} />
                            <span className="text-3xl font-bold text-white">{totalSets}</span>
                            <span className="text-xs text-gray-400 uppercase tracking-wider">Подходов</span>
                        </Card>
                        <Card className="flex flex-col items-center justify-center py-6">
                            <Icon name="clock" className="text-blue-500 mb-2" size={32} />
                            <span className="text-3xl font-bold text-white">{formatTime(averageDuration)}</span>
                            <span className="text-xs text-gray-400 uppercase tracking-wider">Среднее время</span>
                        </Card>
                        <Card className="flex flex-col items-center justify-center py-6 relative">
                            {streak > 0 && (
                                <div className="absolute -top-2 -right-2 streak-indicator">
                                    {streak} дней
                                </div>
                            )}
                            <Icon name="flame" className="text-orange-500 mb-2" size={32} />
                            <span className="text-3xl font-bold text-white">{streak}</span>
                                                        <span className="text-xs text-gray-400 uppercase tracking-wider">Дней подряд</span>
                        </Card>
                    </div>

                    {/* Тренировочный объем */}
                    <Card className="mb-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-white font-bold flex items-center gap-2">
                                <Icon name="bar-chart-3" size={18} className="text-purple-400" />
                                Тренировочный объем
                            </h3>
                            <span className="text-2xl font-bold text-purple-400">{trainingVolume} кг</span>
                        </div>
                        <p className="text-sm text-gray-500 mb-4">
                            Суммарный вес (кг) за все тренировки: {totalWorkouts} тренировок × {totalSets} подходов
                        </p>
                    </Card>

                    {/* Графики */}
                    <Card className="h-80 mb-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-white font-bold flex items-center gap-2">
                                <Icon name="trending-up" size={18} className="text-indigo-400" />
                                Прогресс
                            </h3>
                            <div className="flex gap-2">
                                {['week', 'month', 'all'].map(range => (
                                    <button
