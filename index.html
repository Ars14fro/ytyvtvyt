    const WorkoutPlayer = ({
      workout,
      onClose,
      onComplete,
      settings = DEFAULT_SETTINGS.player,
      onSettingsChange,
      history = [],
      initialDraft = null,
      workspaceId,
      onNotify = () => {}
    }) => {
      const hasDraft = Boolean(
        initialDraft &&
        initialDraft.workout &&
        initialDraft.workout.id === workout.id
      );

      const [actualWeight, setActualWeight] = useState('');
      const [actualReps, setActualReps] = useState('');
      const [actualRpe, setActualRpe] = useState('');

      const [exIndex, setExIndex] = useState(() => {
        if (hasDraft) {
          const idx = toFiniteNumber(initialDraft.exIndex, 0);

          if (idx < workout.exercises.length) {
            return idx;
          }
        }

        return 0;
      });

      const [phase, setPhase] = useState(() => {
        if (hasDraft && initialDraft.phase) {
          return initialDraft.phase;
        }

        return 'init';
      });

      const [timeLeft, setTimeLeft] = useState(() => {
        if (hasDraft && initialDraft.timeLeft !== undefined) {
          return toFiniteNumber(initialDraft.timeLeft, 0);
        }

        return 0;
      });

      const [countdown, setCountdown] = useState(
        toFiniteNumber(settings.countdownDuration, 3) || 3
      );

      const [isPaused, setIsPaused] = useState(() => {
        return Boolean(hasDraft && initialDraft.isPaused);
      });

      const [pausesCount, setPausesCount] = useState(() => {
        if (hasDraft) {
          return toFiniteNumber(initialDraft.pausesCount, 0);
        }

        return 0;
      });

      const [showRestAdvice, setShowRestAdvice] = useState('');

      const [extraSets, setExtraSets] = useState(() => {
        if (hasDraft && initialDraft.extraSets) {
          return initialDraft.extraSets;
        }

        return {};
      });

      const [completedSets, setCompletedSets] = useState(() => {
        if (hasDraft && Array.isArray(initialDraft.completedSets)) {
          const validExerciseIds = new Set(
            workout.exercises.map(ex => ex.id)
          );

          return initialDraft.completedSets.filter(set => {
            return set && validExerciseIds.has(set.exerciseId);
          });
        }

        return [];
      });

      const [showSettings, setShowSettings] = useState(false);
      const [pendingStart, setPendingStart] = useState(false);

      const wakeLockRef = useRef(null);

      const startTimeRef = useRef(
        hasDraft && initialDraft.startTime
          ? toFiniteNumber(initialDraft.startTime, Date.now())
          : Date.now()
      );

      const endTimeRef = useRef(null);

      const pausedTimeRef = useRef(
        hasDraft && initialDraft.pausedTime
          ? toFiniteNumber(initialDraft.pausedTime, 0)
          : 0
      );

      const pauseStartRef = useRef(null);
      const nextTransitionRef = useRef(null);

      const timeLeftRef = useRef(timeLeft);
      const phaseRef = useRef(phase);
      const isPausedRef = useRef(isPaused);

      useEffect(() => {
        timeLeftRef.current = timeLeft;
      }, [timeLeft]);

      useEffect(() => {
        phaseRef.current = phase;
      }, [phase]);

      useEffect(() => {
        isPausedRef.current = isPaused;
      }, [isPaused]);

      const exercise = useMemo(() => {
        return workout.exercises[exIndex];
      }, [exIndex, workout]);

      const getExerciseTotalSets = useCallback((ex) => {
        if (!ex) {
          return 1;
        }

        const baseSets = toFiniteNumber(ex.sets, 1);
        const addedSets = toFiniteNumber(extraSets[ex.id], 0);

        return Math.max(1, baseSets + addedSets);
      }, [extraSets]);

      const totalSets = getExerciseTotalSets(exercise);

      const doneSets = useMemo(() => {
        if (!exercise) {
          return 0;
        }

        return completedSets.filter(set => {
          return set.exerciseId === exercise.id;
        }).length;
      }, [completedSets, exercise]);

      const setIndex = useMemo(() => {
        if (doneSets < totalSets) {
          return doneSets + 1;
        }

        return totalSets;
      }, [doneSets, totalSets]);

      const totalWorkoutSets = useMemo(() => {
        return workout.exercises.reduce((acc, ex) => {
          return acc + getExerciseTotalSets(ex);
        }, 0);
      }, [workout, getExerciseTotalSets]);

      const completedWorkoutSets = useMemo(() => {
        return workout.exercises.reduce((acc, ex) => {
          const done = completedSets.filter(set => {
            return set.exerciseId === ex.id;
          }).length;

          return acc + Math.min(done, getExerciseTotalSets(ex));
        }, 0);
      }, [completedSets, workout, getExerciseTotalSets]);

      const workoutProgress = totalWorkoutSets > 0
        ? (completedWorkoutSets / totalWorkoutSets) * 100
        : 0;

      const prevSetRecord = useMemo(() => {
        if (!Array.isArray(history) || history.length === 0 || !exercise) {
          return null;
        }

        for (let i = history.length - 1; i >= 0; i--) {
          const record = history[i];

          if (!record || !Array.isArray(record.completedSets)) {
            continue;
          }

          const prevSets = sortSets(
            record.completedSets.filter(set => {
              return set && set.exerciseId === exercise.id;
            })
          );

          if (prevSets.length > 0) {
            return prevSets.find(set => {
              return toFiniteNumber(set.setNumber, 0) === setIndex;
            }) || null;
          }
        }

        return null;
      }, [history, exercise, setIndex]);

      const getEffectiveWorkDuration = (ex) => {
        const timer = toFiniteNumber(ex?.timer, 0);

        if (timer > 0) {
          return timer;
        }

        return 60;
      };

      const addExtraSet = () => {
        if (!exercise) {
          return;
        }

        setExtraSets(prev => {
          const current = toFiniteNumber(prev[exercise.id], 0);

          return {
            ...prev,
            [exercise.id]: current + 1
          };
        });

        if (settings.audioMode !== 'silent') {
          AudioEngine.playClick();
        }

        if (phase === 'review' || phase === 'rest') {
          setPendingStart(true);
        }
      };

      const startCountdown = () => {
        setPendingStart(false);
        setPhase('countdown');
        setCountdown(toFiniteNumber(settings.countdownDuration, 3) || 3);

        if (settings.audioMode !== 'silent') {
          AudioEngine.playCountdown();
        }
      };

      const changePhase = (newPhase) => {
        if (!exercise) {
          return;
        }

        if (newPhase === 'work') {
          setPhase('work');
          setActualRpe('');

          if (settings.audioMode !== 'silent') {
            AudioEngine.playStart();
          }

          if (settings.audioMode === 'voice') {
            AudioEngine.speak(exercise.name || 'Упражнение');
          }

          if (exercise.type === 'time') {
            const duration = getEffectiveWorkDuration(exercise);

            endTimeRef.current = Date.now() + duration * 1000;
            setTimeLeft(duration);
          }
        } else if (newPhase === 'rest') {
          setPhase('rest');

          if (settings.audioMode !== 'silent') {
            AudioEngine.playRest();
          }

          if (settings.audioMode === 'voice') {
            if (setIndex < totalSets) {
              AudioEngine.speak('Отдых.');
            } else if (exIndex < workout.exercises.length - 1) {
              AudioEngine.speak(
                'Отдых. Следующее упражнение: ' +
                (workout.exercises[exIndex + 1]?.name || '')
              );
            } else {
              AudioEngine.speak('Отдых перед завершением.');
            }
          }

          const duration = Math.max(0, getRestDuration(exercise, workout));

          endTimeRef.current = Date.now() + duration * 1000;
          setTimeLeft(duration);
          setShowRestAdvice('Глубоко дышите, восстановите пульс');
        } else if (newPhase === 'transit') {
          setPhase('transit');

          if (settings.audioMode !== 'silent') {
            AudioEngine.playRest();
          }

          if (settings.audioMode === 'voice') {
            AudioEngine.speak('Смена снаряда.');
          }

          endTimeRef.current = Date.now() + 15 * 1000;
          setTimeLeft(15);
          setShowRestAdvice('Запишите результат и переходите к следующему снаряду');
        }
      };

      const findNextExercise = () => {
        const currentEx = workout.exercises[exIndex];

        if (!currentEx) {
          return -1;
        }

        if (currentEx.supersetId) {
          for (let i = exIndex + 1; i < workout.exercises.length; i++) {
            if (workout.exercises[i].supersetId !== currentEx.supersetId) {
              break;
            }

            const setsDone = completedSets.filter(set => {
              return set.exerciseId === workout.exercises[i].id;
            }).length;

            if (setsDone < getExerciseTotalSets(workout.exercises[i])) {
              return i;
            }
          }

          let firstEx = exIndex;

          while (
            firstEx > 0 &&
            workout.exercises[firstEx - 1].supersetId === currentEx.supersetId
          ) {
            firstEx--;
          }

          for (let i = firstEx; i <= exIndex; i++) {
            const setsDone = completedSets.filter(set => {
              return set.exerciseId === workout.exercises[i].id;
            }).length;

            if (setsDone < getExerciseTotalSets(workout.exercises[i])) {
              return i;
            }
          }

          let lastEx = exIndex;

          while (
            lastEx < workout.exercises.length - 1 &&
            workout.exercises[lastEx + 1].supersetId === currentEx.supersetId
          ) {
            lastEx++;
          }

          return lastEx + 1 < workout.exercises.length
            ? lastEx + 1
            : -1;
        }

        const setsDone = completedSets.filter(set => {
          return set.exerciseId === currentEx.id;
        }).length;

        if (setsDone < getExerciseTotalSets(currentEx)) {
          return exIndex;
        }

        return exIndex + 1 < workout.exercises.length
          ? exIndex + 1
          : -1;
      };

      const finishWorkout = () => {
        setPhase('complete');

        if (settings.audioMode !== 'silent') {
          AudioEngine.playComplete();
        }

        const currentPausedTime =
          pausedTimeRef.current +
          (pauseStartRef.current ? Date.now() - pauseStartRef.current : 0);

        const duration = Math.floor(
          (Date.now() - startTimeRef.current - currentPausedTime) / 1000
        );

        onComplete({
          duration,
          sets: completedSets.length,
          completedSets,
          workoutName: workout.scheduleName,
          programId: workout.id,
          pauses: pausesCount,
          extraSets
        });

        if (settings.enableVibration && 'vibrate' in navigator) {
          navigator.vibrate([100, 50, 100]);
        }
      };

      const handleWorkComplete = (auto = false) => {
        const currentEx = workout.exercises[exIndex];

        if (!currentEx) {
          return;
        }

        if (!auto && currentEx.type === 'time' && timeLeftRef.current > 0) {
          onNotify(
            'warning',
            'Таймер не закончен',
            'Дождитесь окончания времени или используйте паузу.'
          );

          return;
        }

        setCompletedSets(prev => {
          const remainingTime = auto
            ? 0
            : toFiniteNumber(timeLeftRef.current, 0);

          let finalReps = String(actualReps ?? '').trim();

          if (currentEx.type === 'time' && !finalReps) {
            const effectiveTimer = getEffectiveWorkDuration(currentEx);

            finalReps = String(Math.max(0, effectiveTimer - remainingTime));
          }

          if (!finalReps) {
            const lowerRaw = String(currentEx.reps || '')
              .split('-')[0]
              .trim();

            const lower = lowerRaw.toLowerCase();

            if (lower === 'max') {
              const prevSets = sortSets(
                prev.filter(set => set.exerciseId === currentEx.id)
              );

              const lastReps = prevSets.length > 0
                ? parseSetReps(prevSets[prevSets.length - 1].reps)
                : 0;

              finalReps = String(lastReps > 0 ? lastReps : 1);
            } else {
              finalReps = String(lowerRaw).replace(/[^0-9]/g, '') || '0';
            }
          } else {
            finalReps = String(finalReps).replace(/[^0-9]/g, '') || '0';
          }

          const normalizedWeight = normalizeWeightInput(actualWeight);

          const weightValue = normalizedWeight
            ? normalizedWeight === 'BW'
              ? 'BW'
              : `${normalizedWeight}kg`
            : currentEx.weight || '';

          const rpeValue =
            actualRpe !== '' &&
            actualRpe !== null &&
            actualRpe !== undefined
              ? actualRpe
              : currentEx.rpe;

          const newSet = {
            exerciseId: currentEx.id,
            exerciseName: currentEx.name,
            setNumber: setIndex,
            weight: weightValue,
            reps: finalReps,
            type: currentEx.type,
            rpe: rpeValue,
            timestamp: new Date().toISOString(),
            completed: true
          };

          const existingIdx = prev.findIndex(set => {
            return set.exerciseId === currentEx.id &&
                   toFiniteNumber(set.setNumber, 0) === setIndex;
          });

          let updated;

          if (existingIdx !== -1) {
            const copy = [...prev];
            copy[existingIdx] = newSet;
            updated = copy;
          } else {
            updated = [...prev, newSet];
          }

          nextTransitionRef.current = {
            updated,
            currentEx
          };

          return updated;
        });
      };

      const handleRestComplete = () => {
        const nextIndex = findNextExercise();

        if (nextIndex !== -1) {
          setExIndex(nextIndex);
          setPendingStart(true);
        } else {
          finishWorkout();
        }
      };

      const handleTransitComplete = () => {
        const nextIndex = findNextExercise();

        if (nextIndex !== -1) {
          setExIndex(nextIndex);
          setPendingStart(true);
        } else {
          finishWorkout();
        }
      };

      const changePhaseRef = useRef(changePhase);
      const handleWorkCompleteRef = useRef(handleWorkComplete);
      const handleRestCompleteRef = useRef(handleRestComplete);
      const handleTransitCompleteRef = useRef(handleTransitComplete);
      const startCountdownRef = useRef(startCountdown);

      useEffect(() => {
        changePhaseRef.current = changePhase;
        handleWorkCompleteRef.current = handleWorkComplete;
        handleRestCompleteRef.current = handleRestComplete;
        handleTransitCompleteRef.current = handleTransitComplete;
        startCountdownRef.current = startCountdown;
      });

      useEffect(() => {
        if (!exercise) {
          return;
        }

        const exerciseSets = sortSets(
          completedSets.filter(set => set.exerciseId === exercise.id)
        );

        const lastDoneSet = exerciseSets.length > 0
          ? exerciseSets[exerciseSets.length - 1]
          : null;

        if (lastDoneSet && setIndex > 1) {
          setActualWeight(normalizeWeightInput(lastDoneSet.weight));
          setActualReps(String(lastDoneSet.reps ?? ''));
          setActualRpe(lastDoneSet.rpe ?? '');
        } else {
          setActualWeight(normalizeWeightInput(exercise.weight));
          setActualRpe(exercise.rpe ?? '');

          if (exercise.type === 'time') {
            setActualReps(String(getEffectiveWorkDuration(exercise)));
          } else {
            const lower = String(exercise.reps || '')
              .split('-')[0]
              .trim();

            setActualReps(lower.toLowerCase() === 'max' ? '' : lower);
          }
        }
      }, [exIndex, setIndex, exercise, completedSets]);

      useEffect(() => {
        if (phase === 'init') {
          startCountdownRef.current?.();
        }

        if (settings.enableVibration && 'vibrate' in navigator) {
          navigator.vibrate(100);
        }

        const shouldRestoreEndTime =
          (
            phase === 'rest' ||
            phase === 'transit' ||
            (phase === 'work' && exercise?.type === 'time')
          ) &&
          timeLeft > 0 &&
          !isPaused;

        if (shouldRestoreEndTime) {
          endTimeRef.current = Date.now() + timeLeft * 1000;
        }

        const requestWakeLock = async () => {
          if ('wakeLock' in navigator) {
            try {
              wakeLockRef.current = await navigator.wakeLock.request('screen');
            } catch (error) {
              console.log('Wake Lock error:', error);
            }
          }
        };

        requestWakeLock();

        return () => {
          if (wakeLockRef.current) {
            wakeLockRef.current.release();
            wakeLockRef.current = null;
          }
        };
      }, []);

      useEffect(() => {
        if (
          isPaused ||
          phase === 'complete' ||
          phase === 'init' ||
          phase === 'review'
        ) {
          return;
        }

        const tick = () => {
          if (phase === 'countdown') {
            setCountdown(prev => {
              if (prev <= 1) {
                setTimeout(() => {
                  changePhaseRef.current?.('work');
                }, 0);

                return 0;
              }

              if (settings.audioMode !== 'silent') {
                AudioEngine.playCountdown();
              }

              return prev - 1;
            });
          } else if (phase === 'work' && exercise?.type === 'time') {
            const remain = Math.ceil(
              (endTimeRef.current - Date.now()) / 1000
            );

            if (remain <= 0) {
              setTimeLeft(0);

              setTimeout(() => {
                handleWorkCompleteRef.current?.(true);
              }, 0);
            } else {
              setTimeLeft(remain);
            }
          } else if (phase === 'rest') {
            const remain = Math.ceil(
              (endTimeRef.current - Date.now()) / 1000
            );

            if (remain <= 0) {
              setTimeLeft(0);
              handleRestCompleteRef.current?.();
            } else {
              if (remain > 30) {
                setShowRestAdvice('Глубоко дышите, восстановите пульс');
              } else if (remain > 10) {
                setShowRestAdvice('Приготовьтесь к следующему подходу');
              } else {
                setShowRestAdvice('Вставайте в исходное положение');
              }

              if (remain <= 3 && remain > 0) {
                if (settings.audioMode !== 'silent') {
                  AudioEngine.playBeep();
                }

                if (settings.enableVibration && 'vibrate' in navigator) {
                  navigator.vibrate(50);
                }
              }

              setTimeLeft(remain);
            }
          } else if (phase === 'transit') {
            const remain = Math.ceil(
              (endTimeRef.current - Date.now()) / 1000
            );

            if (remain <= 0) {
              setTimeLeft(0);
              handleTransitCompleteRef.current?.();
            } else {
              if (remain <= 3 && remain > 0) {
                if (settings.audioMode !== 'silent') {
                  AudioEngine.playBeep();
                }

                if (settings.enableVibration && 'vibrate' in navigator) {
                  navigator.vibrate(50);
                }
              }

              setTimeLeft(remain);
            }
          }
        };

        const interval = setInterval(tick, 1000);

        return () => clearInterval(interval);
      }, [phase, isPaused, exercise, settings]);

      useEffect(() => {
        if (!nextTransitionRef.current) {
          return;
        }

        const { updated, currentEx } = nextTransitionRef.current;

        nextTransitionRef.current = null;

        const getNextExIdx = () => {
          if (currentEx.supersetId) {
            for (let i = exIndex + 1; i < workout.exercises.length; i++) {
              if (workout.exercises[i].supersetId !== currentEx.supersetId) {
                break;
              }

              const done = updated.filter(set => {
                return set.exerciseId === workout.exercises[i].id;
              }).length;

              if (done < getExerciseTotalSets(workout.exercises[i])) {
                return i;
              }
            }

            let firstEx = exIndex;

            while (
              firstEx > 0 &&
              workout.exercises[firstEx - 1].supersetId === currentEx.supersetId
            ) {
              firstEx--;
            }

            for (let i = firstEx; i <= exIndex; i++) {
              const done = updated.filter(set => {
                return set.exerciseId === workout.exercises[i].id;
              }).length;

              if (done < getExerciseTotalSets(workout.exercises[i])) {
                return i;
              }
            }

            let lastEx = exIndex;

            while (
              lastEx < workout.exercises.length - 1 &&
              workout.exercises[lastEx + 1].supersetId === currentEx.supersetId
            ) {
              lastEx++;
            }

            return lastEx + 1 < workout.exercises.length
              ? lastEx + 1
              : -1;
          }

          const done = updated.filter(set => {
            return set.exerciseId === currentEx.id;
          }).length;

          if (done < getExerciseTotalSets(currentEx)) {
            return exIndex;
          }

          return exIndex + 1 < workout.exercises.length
            ? exIndex + 1
            : -1;
        };

        const nextIdx = getNextExIdx();

        if (nextIdx === -1) {
          setPhase('review');
          setShowRestAdvice('Проверьте результат последнего подхода');

          if (settings.audioMode !== 'silent') {
            AudioEngine.playRest();
          }
        } else if (nextIdx === exIndex) {
          changePhase('rest');
        } else {
          const nextEx = workout.exercises[nextIdx];

          if (
            currentEx.supersetId &&
            nextEx.supersetId === currentEx.supersetId
          ) {
            changePhase('transit');
          } else {
            changePhase('rest');
          }
        }
      }, [completedSets]);

      useEffect(() => {
        if (pendingStart && phase !== 'complete' && phase !== 'init') {
          startCountdown();
          setPendingStart(false);
        }
      }, [exIndex, pendingStart]);

      useEffect(() => {
        if (!workout || phase === 'complete' || phase === 'init') {
          return;
        }

        const draft = {
          workout,
          exIndex,
          completedSets,
          extraSets,
          timestamp: Date.now(),
          startTime: startTimeRef.current,
          phase,
          timeLeft,
          pausesCount,
          pausedTime: pausedTimeRef.current,
          isPaused
        };

        try {
          localStorage.setItem(
            `flexcode_draft_${workspaceId}`,
            JSON.stringify(draft)
          );
        } catch (error) {
          console.error('Ошибка сохранения черновика:', error);
        }
      }, [
        workout,
        exIndex,
        completedSets,
        extraSets,
        phase,
        timeLeft,
        pausesCount,
        workspaceId,
        isPaused
      ]);

      const saveCurrentSetSoftly = () => {
        if (phase !== 'work' || !exercise) {
          return;
        }

        const normalizedWeight = normalizeWeightInput(actualWeight);
        const hasWeight = normalizedWeight !== '';
        const hasReps = String(actualReps || '').trim() !== '';

        if (!hasWeight && !hasReps) {
          return;
        }

        setCompletedSets(prev => {
          let finalReps = String(actualReps ?? '').trim();

          if (exercise.type === 'time' && !finalReps) {
            finalReps = String(getEffectiveWorkDuration(exercise));
          }

          if (!finalReps) {
            const lowerRaw = String(exercise.reps || '')
              .split('-')[0]
              .trim();

            const lower = lowerRaw.toLowerCase();

            if (lower === 'max') {
              const prevSets = sortSets(
                prev.filter(set => set.exerciseId === exercise.id)
              );

              const lastReps = prevSets.length > 0
                ? parseSetReps(prevSets[prevSets.length - 1].reps)
                : 0;

              finalReps = String(lastReps > 0 ? lastReps : 1);
            } else {
              finalReps = String(lowerRaw).replace(/[^0-9]/g, '') || '0';
            }
          } else {
            finalReps = String(finalReps).replace(/[^0-9]/g, '') || '0';
          }

          const weightValue = normalizedWeight
            ? normalizedWeight === 'BW'
              ? 'BW'
              : `${normalizedWeight}kg`
            : exercise.weight || '';

          const newSet = {
            exerciseId: exercise.id,
            exerciseName: exercise.name,
            setNumber: setIndex,
            weight: weightValue,
            reps: finalReps,
            type: exercise.type,
            rpe: actualRpe || exercise.rpe,
            timestamp: new Date().toISOString(),
            completed: true
          };

          const existingIdx = prev.findIndex(set => {
            return set.exerciseId === exercise.id &&
                   toFiniteNumber(set.setNumber, 0) === setIndex;
          });

          if (existingIdx !== -1) {
            const copy = [...prev];
            copy[existingIdx] = newSet;
            return copy;
          }

          return [...prev, newSet];
        });
      };

      const handleNext = () => {
        if (exIndex < workout.exercises.length - 1) {
          saveCurrentSetSoftly();
          setExIndex(prev => prev + 1);
          setPendingStart(true);
        }
      };

      const handlePrevious = () => {
        if (exIndex > 0) {
          saveCurrentSetSoftly();
          setExIndex(prev => prev - 1);
          setPendingStart(true);
        }
      };

      const handleManualComplete = () => {
        if (settings.audioMode !== 'silent') {
          AudioEngine.playClick();
        }

        if (phase === 'work') {
          handleWorkComplete(false);
        } else if (phase === 'rest') {
          handleRestComplete();
        } else if (phase === 'transit') {
          handleTransitComplete();
        } else if (phase === 'review') {
          finishWorkout();
        }
      };

      const togglePause = () => {
        if (phase === 'review' || phase === 'complete' || phase === 'init') {
          return;
        }

        if (!isPaused) {
          pauseStartRef.current = Date.now();
          setPausesCount(prev => prev + 1);
        } else {
          if (pauseStartRef.current) {
            pausedTimeRef.current += Date.now() - pauseStartRef.current;
            pauseStartRef.current = null;
          }

          const shouldRestoreEndTime =
            phase === 'rest' ||
            phase === 'transit' ||
            (phase === 'work' && exercise?.type === 'time');

          if (shouldRestoreEndTime && timeLeftRef.current > 0) {
            endTimeRef.current = Date.now() + timeLeftRef.current * 1000;
          }
        }

        setIsPaused(prev => !prev);

        if (settings.audioMode !== 'silent') {
          AudioEngine.playClick();
        }
      };

      const getButtonText = () => {
        if (phase === 'countdown') {
          return 'Готовность...';
        }

        if (phase === 'work') {
          return 'Завершить подход';
        }

        if (phase === 'review') {
          return 'Завершить тренировку';
        }

        if (phase === 'rest') {
          const nextIndex = findNextExercise();

          if (nextIndex === -1) {
            return 'Завершить тренировку';
          }

          return 'Пропустить отдых';
        }

        if (phase === 'transit') {
          return 'К снаряду!';
        }

        return 'Далее';
      };

      const updateLastExerciseSet = (patch) => {
        setCompletedSets(prev => {
          const newSets = [...prev];

          let lastIdx = -1;

          for (let i = newSets.length - 1; i >= 0; i--) {
            if (newSets[i].exerciseId === exercise.id) {
              lastIdx = i;
              break;
            }
          }

          if (lastIdx !== -1) {
            newSets[lastIdx] = {
              ...newSets[lastIdx],
              ...patch
            };
          }

          return newSets;
        });
      };

      if (!exercise) {
        return null;
      }

      const workDuration = getEffectiveWorkDuration(exercise);

      const restDuration = Math.max(
        0,
        getRestDuration(exercise, workout)
      );

      const restDenominator =
        phase === 'transit'
          ? 15
          : restDuration > 0
            ? restDuration
            : 1;

      const workTimeDenominator = workDuration > 0 ? workDuration : 1;

      const nextExerciseIndex = phase === 'rest'
        ? findNextExercise()
        : -1;

      const actualResultEditor = (
        <div className="mt-6 bg-surface/80 border border-white/10 p-5 rounded-2xl max-w-sm mx-auto shadow-lg animate-fade-in">
          <h4 className="text-white font-bold mb-4 text-center flex items-center justify-center gap-2">
            <Icon name="edit-3" size={16} className="text-indigo-400" />
            Фактический результат
          </h4>

          <div className="flex gap-4">
            <div className="flex-1">
              <label className="text-xs text-gray-400 uppercase font-bold mb-1 block text-center">
                Вес (кг)
              </label>

              <input
                type="text"
                inputMode="decimal"
                className="w-full bg-dark/50 border border-white/10 rounded-xl p-3 text-white text-center text-xl font-bold focus:border-indigo-500 outline-none transition-colors"
                value={actualWeight}
                onChange={(e) => {
                  const normalized = normalizeWeightInput(e.target.value);

                  setActualWeight(normalized);

                  const weightValue = normalized
                    ? normalized === 'BW'
                      ? 'BW'
                      : `${normalized}kg`
                    : '0kg';

                  updateLastExerciseSet({ weight: weightValue });
                }}
                onClick={(e) => e.target.select()}
              />
            </div>

            <div className="flex-1">
              <label className="text-xs text-gray-400 uppercase font-bold mb-1 block text-center">
                {exercise?.type === 'time' ? 'Время (с)' : 'Повторы'}
              </label>

              <input
                type="text"
                inputMode="numeric"
                className="w-full bg-dark/50 border border-white/10 rounded-xl p-3 text-white text-center text-xl font-bold focus:border-indigo-500 outline-none transition-colors"
                value={actualReps}
                onChange={(e) => {
                  const val = e.target.value.replace(/[^0-9]/g, '');

                  setActualReps(val);
                  updateLastExerciseSet({ reps: val });
                }}
                onClick={(e) => e.target.select()}
              />
            </div>
          </div>

          <div className="mt-4 pt-4 border-t border-white/10">
            <label className="text-xs text-gray-400 uppercase font-bold mb-2 block text-center">
              Фактическое усилие (RPE)
            </label>

            <div className="flex justify-center gap-2">
              {[6, 7, 8, 9, 10].map(val => (
                <button
                  key={val}
                  onClick={() => {
                    setActualRpe(val);
                    updateLastExerciseSet({ rpe: val });
                  }}
                  className={`w-10 h-10 rounded-full font-bold flex items-center justify-center transition-all ${toFiniteNumber(actualRpe, 0) === val ? 'bg-red-500 text-white shadow-[0_0_10px_rgba(239,68,68,0.5)] scale-110' : 'bg-surface border border-white/10 text-gray-400'}`}
                >
                  {val}
                </button>
              ))}
            </div>
          </div>

          <p className="text-[10px] text-gray-500 text-center mt-3 uppercase tracking-wider">
            Эти данные сохранятся в историю
          </p>
        </div>
      );

      return (
        <div className="fixed inset-0 z-50 bg-dark flex flex-col safe-pb safe-pt overflow-hidden noselect">
          <div className="glass-header p-4">
            <div className="flex items-center justify-between mb-3">
              <button
                onClick={() => {
                  if (confirm('Завершить тренировку досрочно? Данные не сохранятся.')) {
                    localStorage.removeItem(`flexcode_draft_${workspaceId}`);
                    onClose();
                  }
                }}
                className="p-2 bg-white/5 rounded-full hover:bg-white/10"
              >
                <Icon name="chevron-down" size={20} />
              </button>

              <div className="text-center">
                <h2 className="font-bold text-white text-lg">
                  {workout.scheduleName}
                </h2>
              </div>

              <div className="flex items-center gap-2">
                <button
                  onClick={() => setShowSettings(true)}
                  className="p-2 bg-white/5 rounded-full hover:bg-white/10"
                >
                  <Icon name="settings" size={20} />
                </button>

                <button
                  onClick={togglePause}
                  className={`p-2 rounded-full ${isPaused ? 'bg-yellow-500/20 text-yellow-500' : 'bg-white/5'}`}
                >
                  <Icon name={isPaused ? 'play' : 'pause'} size={20} />
                </button>
              </div>
            </div>

            {settings.showProgressBar && (
              <ProgressBar
                progress={workoutProgress}
                label={`Прогресс: ${completedWorkoutSets}/${totalWorkoutSets} подходов`}
              />
            )}
          </div>

          <div className="flex-1 flex flex-col items-center justify-start pt-8 p-4 relative overflow-y-auto">
            {phase === 'countdown' && (
              <div className="absolute inset-0 z-10 flex items-center justify-center bg-black/90 backdrop-blur-sm">
                <div className="text-center">
                  <div className="text-[10rem] font-black text-white leading-none animate-countdown-pop">
                    {countdown}
                  </div>

                  <p className="text-2xl font-bold text-indigo-400 mt-4 uppercase tracking-widest">
                    Приготовиться
                  </p>

                  <p className="text-gray-400 mt-2">
                    Подход {setIndex}/{totalSets}
                  </p>
                </div>
              </div>
            )}

            <div className={`w-full max-w-2xl mb-6 transition-all duration-300 ${phase === 'rest' || phase === 'review' ? 'opacity-60' : 'opacity-100'}`}>
              <div className="text-center mb-6">
                <div className="flex items-center justify-center gap-2 mb-4">
                  <span className="inline-block px-3 py-1 bg-indigo-500/10 text-indigo-400 rounded-full text-xs font-bold uppercase tracking-wider">
                    {exercise?.equipment || 'Без оборудования'}
                  </span>

                  <span className="inline-block px-3 py-1 bg-white/5 text-gray-400 rounded-full text-xs font-bold uppercase tracking-wider">
                    Подход {setIndex}/{totalSets}
                  </span>
                </div>

                <h1 className="text-3xl sm:text-4xl font-black text-white leading-tight mb-2">
                  {exercise?.name}
                </h1>

                {settings.showDescriptions && exercise?.description && (
                  <p className="text-gray-400 text-sm max-w-2xl mx-auto">
                    {exercise.description}
                  </p>
                )}
              </div>

              <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mb-6">
                {exercise?.rpe && (
                  <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-center">
                    <p className="text-xs text-red-400/70 uppercase mb-1">
                      Усилие (RPE)
                    </p>
                    <p className="text-xl font-bold text-red-400">
                      {exercise.rpe}
                    </p>
                  </div>
                )}

                {exercise?.tempo && (
                  <div className="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl text-center">
                    <p className="text-xs text-blue-400/70 uppercase mb-1">
                      Темп
                    </p>
                    <p className="text-xl font-bold text-blue-400">
                      {exercise.tempo}
                    </p>
                  </div>
                )}

                <div className="bg-surface/50 border border-white/5 p-4 rounded-2xl text-center hover:bg-surface/70 transition-colors group cursor-text">
                  <p className="text-xs text-gray-500 uppercase mb-1">
                    Вес (кг)
                  </p>

                  {exercise?.type === 'time' || (exercise?.equipment === 'Собственный вес' && !exercise?.weight) ? (
                    <p className="text-xl font-bold text-white">
                      {formatWeight(exercise?.weight) || '--'}
                    </p>
                  ) : (
                    <input
                      type="text"
                      inputMode="decimal"
                      value={actualWeight}
                      onChange={(e) => {
                        setActualWeight(normalizeWeightInput(e.target.value));
                      }}
                      className="w-full bg-transparent text-xl font-bold text-white text-center outline-none border-b border-transparent focus:border-indigo-500 transition-colors"
                      placeholder={normalizeWeightInput(exercise?.weight) || '0'}
                      onClick={(e) => e.target.select()}
                    />
                  )}
                </div>

                <div className="bg-surface/50 border border-white/5 p-4 rounded-2xl text-center hover:bg-surface/70 transition-colors group cursor-text">
                  <p className="text-xs text-gray-500 uppercase mb-1">
                    {exercise?.type === 'time' ? 'Время (с)' : 'Повторы'}
                  </p>

                  {exercise?.type === 'time' ? (
                    <p className="text-xl font-bold text-white">
                      {workDuration}с
                    </p>
                  ) : (
                    <input
                      type="text"
                      inputMode="numeric"
                      value={actualReps}
                      onChange={(e) => {
                        const val = e.target.value.replace(/[^0-9]/g, '');
                        setActualReps(val);
                      }}
                      className="w-full bg-transparent text-xl font-bold text-white text-center outline-none border-b border-transparent focus:border-indigo-500 transition-colors"
                      placeholder={String(exercise?.reps || '').split('-')[0].trim() || '0'}
                      onClick={(e) => e.target.select()}
                    />
                  )}
                </div>

                <div className="bg-surface/50 border border-white/5 p-4 rounded-2xl text-center hover:bg-surface/70 transition-colors">
                  <p className="text-xs text-gray-500 uppercase mb-1">
                    Подходы
                  </p>

                  <p className="text-xl font-bold text-white">
                    {totalSets}
                  </p>

                  {doneSets >= totalSets && phase !== 'complete' && phase !== 'countdown' && phase !== 'transit' && (
                    <button
                      onClick={addExtraSet}
                      className="mt-2 text-xs px-2 py-1 rounded-lg bg-indigo-500/20 text-indigo-300 hover:bg-indigo-500/30 transition-colors"
                    >
                      + подход
                    </button>
                  )}
                </div>

                <div className="bg-surface/50 border border-white/5 p-4 rounded-2xl text-center hover:bg-surface/70 transition-colors">
                  <p className="text-xs text-gray-500 uppercase mb-1">
                    Отдых
                  </p>

                  <p className="text-xl font-bold text-white">
                    {restDuration}с
                  </p>
                </div>

                {prevSetRecord && (
                  <div className="col-span-3 md:col-span-6 bg-indigo-500/10 rounded-xl p-3 text-center border border-indigo-500/20">
                    <p className="text-sm text-gray-400">
                      Прошлая тренировка (Подход {setIndex}):{' '}
                      <span className="text-indigo-300 font-bold">
                        {prevSetRecord.weight} × {prevSetRecord.reps}
                      </span>
                    </p>
                  </div>
                )}
              </div>

              <div className="mb-6">
                <h3 className="text-white font-bold mb-3">
                  Упражнения программы:
                </h3>

                <div className="space-y-2">
                  {workout.exercises.map((ex, idx) => (
                    <div
                      key={ex.id}
                      className={`p-3 rounded-lg border ${idx === exIndex ? 'border-indigo-500 bg-indigo-500/10 highlight-current' : 'border-white/5 bg-surface/30'}`}
                    >
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center ${idx === exIndex ? 'bg-indigo-500' : 'bg-white/5'}`}>
                            <span className="text-xs font-bold">
                              {idx + 1}
                            </span>
                          </div>

                          <div>
                            <p className="font-medium text-white">
                              {ex.name}
                            </p>

                            <p className="text-xs text-gray-500">
                              {getExerciseTotalSets(ex)} ×{' '}
                              {ex.type === 'time'
                                ? `${getEffectiveWorkDuration(ex)}с`
                                : ex.reps}
                            </p>
                          </div>
                        </div>

                        {idx === exIndex && (
                          <div className="animate-pulse">
                            <Icon name="activity" size={16} className="text-indigo-400" />
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="relative z-0 mb-6 w-full">
              {phase === 'review' ? (
                <div className="text-center w-full max-w-sm mx-auto">
                  <div className="mb-4 flex flex-col items-center">
                    <div className="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mb-3">
                      <Icon name="check-circle" size={32} className="text-green-400" />
                    </div>

                    <p className="text-white font-bold text-lg">
                      Последний подход завершён
                    </p>

                    <p className="text-sm text-gray-400">
                      Проверьте результат и завершите тренировку
                    </p>
                  </div>

                  {actualResultEditor}
                </div>
              ) : phase === 'rest' || phase === 'transit' ? (
                <div className="text-center">
                  <CircularTimer
                    progress={(timeLeft / restDenominator) * 100}
                    timeString={formatTime(timeLeft)}
                    label={phase === 'transit' ? 'Суперсет' : 'Отдых'}
                    color={phase === 'transit' ? '#f59e0b' : '#10b981'}
                    pulse={timeLeft <= 10}
                    size={200}
                  />

                  {showRestAdvice && (
                    <div className="mt-4 text-center">
                      <p className={`text-lg font-medium ${phase === 'transit' ? 'text-yellow-400' : 'text-emerald-400'}`}>
                        {showRestAdvice}
                      </p>

                      {settings.showRestTime && phase === 'rest' && (
                        <p className="text-sm text-gray-500 mt-1 mb-4">
                          Отдых: {restDuration} секунд
                        </p>
                      )}
                    </div>
                  )}

                  {actualResultEditor}
                </div>
              ) : exercise?.type === 'time' ? (
                <div className="text-center">
                  <CircularTimer
                    progress={(timeLeft / workTimeDenominator) * 100}
                    timeString={formatTime(timeLeft)}
                    label="Работа"
                    color="#6366f1"
                    size={200}
                  />

                  <button
                    onClick={togglePause}
                    className="mt-4 px-4 py-2 bg-indigo-500/20 text-indigo-400 rounded-lg hover:bg-indigo-500/30 transition-colors"
                  >
                    {isPaused ? 'Продолжить' : 'Пауза'}
                  </button>
                </div>
              ) : (
                <div className="w-60 h-60 mx-auto rounded-full bg-gradient-to-br from-indigo-500/10 to-purple-500/10 border-4 border-indigo-500/20 flex flex-col items-center justify-center animate-pulse-slow">
                  <span className="text-6xl font-black text-white">
                    {exercise?.reps || '--'}
                  </span>

                  <span className="text-indigo-300 font-medium uppercase mt-2">
                    Повторений
                  </span>
                </div>
              )}
            </div>

            {nextExerciseIndex !== -1 && nextExerciseIndex !== exIndex && (
              <div className="mt-4 p-4 bg-surface/30 rounded-xl border border-white/5">
                <p className="text-sm text-gray-500 mb-1">
                  Следующее упражнение:
                </p>

                <p className="font-bold text-white">
                  {workout.exercises[nextExerciseIndex]?.name} •{' '}
                  {getExerciseTotalSets(workout.exercises[nextExerciseIndex])} подходов
                </p>
              </div>
            )}
          </div>

          <div className="p-4 sm:p-6 bg-surface border-t border-white/5">
            <div className="flex items-center gap-3 max-w-md mx-auto">
              <button
                onClick={handlePrevious}
                disabled={exIndex === 0 || phase === 'work'}
                className="w-14 h-14 flex-shrink-0 flex items-center justify-center rounded-xl bg-surfaceLight/40 text-gray-400 hover:text-white hover:bg-surfaceLight disabled:opacity-30 transition-all active:scale-95 border border-white/5"
              >
                <Icon name="chevron-left" size={28} />
              </button>

              <Button
                onClick={handleManualComplete}
                disabled={phase === 'work' && exercise?.type === 'time' && timeLeft > 0}
                className="flex-1 h-14 text-lg font-bold shadow-lg"
                variant={phase === 'rest' || phase === 'transit' || phase === 'review' ? 'accent' : 'primary'}
              >
                {getButtonText()}
              </Button>

              <button
                onClick={handleNext}
                disabled={exIndex === workout.exercises.length - 1 || phase === 'work'}
                className="w-14 h-14 flex-shrink-0 flex items-center justify-center rounded-xl bg-surfaceLight/40 text-gray-400 hover:text-white hover:bg-surfaceLight disabled:opacity-30 transition-all active:scale-95 border border-white/5"
              >
                <Icon name="chevron-right" size={28} />
              </button>
            </div>
          </div>

          <PlayerSettingsModal
            isOpen={showSettings}
            onClose={() => setShowSettings(false)}
            settings={settings}
            onSettingsChange={onSettingsChange}
          />
        </div>
      );
    };

    /* ===== КОНЕЦ ЧАСТИ 4/6 (ВЕРСИЯ 3) ===== */
    /* ===== ЧАСТЬ 5/6 (ВЕРСИЯ 2): СТАТИСТИКА, РАСПИСАНИЕ, ПРОГРАММЫ, НАПОМИНАНИЯ, ПРОФИЛИ ===== */

    const estimateProgramDuration = (program) => {
      if (!program || !Array.isArray(program.exercises)) {
        return 0;
      }

      const seconds = program.exercises.reduce((acc, ex) => {
        const sets = Math.max(1, toFiniteNumber(ex?.sets, 1));

        const workSeconds = ex?.type === 'time'
          ? Math.max(1, getWorkDuration(ex))
          : 45;

        const restSeconds = getRestDuration(ex, program);

        return acc + sets * (workSeconds + restSeconds);
      }, 0);

      return Math.max(1, Math.round(seconds / 60));
    };

    const StatsDashboard = ({ history = [], programs = [] }) => {
      const [timeRange, setTimeRange] = useState('week');
      const [selectedExerciseId, setSelectedExerciseId] = useState('');

      const chartRef = useRef(null);
      const volumeChartRef = useRef(null);

      const chartInstanceRef = useRef(null);
      const volumeChartInstanceRef = useRef(null);

      const safePrograms = Array.isArray(programs) ? programs : [];
      const safeHistory = Array.isArray(history) ? history : [];

      const allExercises = useMemo(() => {
        const map = new Map();

        safeHistory.forEach(h => {
          if (!Array.isArray(h?.completedSets)) {
            return;
          }

          h.completedSets.forEach(set => {
            if (set?.exerciseName) {
              map.set(set.exerciseName, set.exerciseName);
            }
          });
        });

        return Array.from(map.values()).sort();
      }, [safeHistory]);

      useEffect(() => {
        if (!selectedExerciseId && allExercises.length > 0) {
          setSelectedExerciseId(allExercises[0]);
        }
      }, [allExercises, selectedExerciseId]);

      const totalWorkouts = safeHistory.length;

      const totalSets = safeHistory.reduce((acc, curr) => {
        return acc + toFiniteNumber(curr?.sets, 0);
      }, 0);

      const totalDuration = safeHistory.reduce((acc, curr) => {
        return acc + toFiniteNumber(curr?.duration, 0);
      }, 0);

      const averageDuration = totalWorkouts > 0
        ? Math.round(totalDuration / totalWorkouts)
        : 0;

      const streak = calculateDailyStreak(safeHistory);

      const trainingVolume = useMemo(() => {
        let volume = 0;

        safeHistory.forEach(record => {
          const program =
            safePrograms.find(p => p?.id === record?.programId) ||
            safePrograms.find(p => p?.scheduleName === record?.programName);

          if (program && Array.isArray(record.completedSets)) {
            record.completedSets.forEach(set => {
              const exercise = Array.isArray(program.exercises)
                ? program.exercises.find(e => e?.id === set?.exerciseId)
                : null;

              volume += calculateTrainingVolume(exercise || {}, set);
            });
          }
        });

        return Math.round(volume);
      }, [safeHistory, safePrograms]);

      useEffect(() => {
        const destroyChart = () => {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
            chartInstanceRef.current = null;
          }
        };

        if (!chartRef.current || !window.Chart || safeHistory.length === 0) {
          destroyChart();
          return;
        }

        const ctx = chartRef.current.getContext('2d');

        destroyChart();

        let filteredHistory = [...safeHistory];
        const now = new Date();

        if (timeRange === 'week') {
          const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          filteredHistory = safeHistory.filter(h => new Date(h.date) >= weekAgo);
        } else if (timeRange === 'month') {
          const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
          filteredHistory = safeHistory.filter(h => new Date(h.date) >= monthAgo);
        }

        const groupedData = {};

        filteredHistory.forEach(h => {
          const d = new Date(h.date);

          const key = d.toLocaleDateString('ru-RU', {
            day: '2-digit',
            month: 'short'
          });

          if (!groupedData[key]) {
            groupedData[key] = {
              sets: 0,
              workouts: 0,
              ts: new Date(d).setHours(0, 0, 0, 0)
            };
          }

          groupedData[key].sets += toFiniteNumber(h.sets, 0);
          groupedData[key].workouts += 1;
        });

        const labels = Object.keys(groupedData).sort((a, b) => {
          return groupedData[a].ts - groupedData[b].ts;
        });

        const setsData = labels.map(label => groupedData[label].sets);
        const workoutsData = labels.map(label => groupedData[label].workouts);

        const chart = new window.Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Подходы',
                data: setsData,
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                tension: 0.4,
                fill: true,
                yAxisID: 'y'
              },
              {
                label: 'Тренировки',
                data: workoutsData,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                tension: 0.4,
                fill: false,
                yAxisID: 'y1'
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: 'index',
              intersect: false
            },
            plugins: {
              legend: {
                display: true,
                labels: {
                  color: '#94a3b8',
                  font: {
                    family: "'Inter', sans-serif"
                  }
                }
              },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                titleColor: '#e2e8f0',
                bodyColor: '#cbd5e1',
                borderColor: '#334155',
                borderWidth: 1
              }
            },
            scales: {
              x: {
                grid: {
                  color: 'rgba(255, 255, 255, 0.05)'
                },
                ticks: {
                  color: '#94a3b8',
                  font: {
                    family: "'Inter', sans-serif"
                  }
                }
              },
              y: {
                type: 'linear',
                display: true,
                position: 'left',
                suggestedMax: 5,
                grid: {
                  color: 'rgba(255, 255, 255, 0.05)'
                },
                ticks: {
                  color: '#94a3b8',
                  precision: 0,
                  font: {
                    family: "'Inter', sans-serif"
                  }
                }
              },
              y1: {
                type: 'linear',
                display: true,
                position: 'right',
                suggestedMax: 2,
                grid: {
                  drawOnChartArea: false
                },
                ticks: {
                  color: '#10b981',
                  precision: 0,
                  font: {
                    family: "'Inter', sans-serif"
                  }
                }
              }
            }
          }
        });

        chartInstanceRef.current = chart;

        return () => {
          destroyChart();
        };
      }, [safeHistory, timeRange]);

      useEffect(() => {
        const destroyVolumeChart = () => {
          if (volumeChartInstanceRef.current) {
            volumeChartInstanceRef.current.destroy();
            volumeChartInstanceRef.current = null;
          }
        };

        if (!volumeChartRef.current || !window.Chart || safeHistory.length === 0) {
          destroyVolumeChart();
          return;
        }

        if (!selectedExerciseId) {
          destroyVolumeChart();
          return;
        }

        const ctx = volumeChartRef.current.getContext('2d');

        destroyVolumeChart();

        const exerciseHistory = safeHistory.filter(h => {
          return Array.isArray(h?.completedSets) &&
                 h.completedSets.some(set => set?.exerciseName === selectedExerciseId);
        });

        const last10Workouts = [...exerciseHistory]
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .slice(0, 10)
          .reverse();

        if (last10Workouts.length === 0) {
          return;
        }

        const labels = last10Workouts.map(h => {
          return new Date(h.date).toLocaleDateString('ru-RU', {
            day: 'numeric',
            month: 'short'
          });
        });

        const volumeData = last10Workouts.map(h => {
          let max1RM = 0;

          h.completedSets
            .filter(set => {
              return set?.exerciseName === selectedExerciseId &&
                     set?.type !== 'time' &&
                     set?.weight &&
                     !isBodyweight(set.weight);
            })
            .forEach(set => {
              const weight = parseWeight(set.weight);
              const reps = parseFirstReps(set.reps);

              if (!weight || !reps) {
                return;
              }

              const e1rm = weight * (1 + reps / 30);

              if (e1rm > max1RM) {
                max1RM = e1rm;
              }
            });

          return Math.round(max1RM);
        });

        const chart = new window.Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Макс. e1RM (кг)',
                data: volumeData,
                backgroundColor: 'rgba(234, 179, 8, 0.2)',
                borderColor: 'rgba(234, 179, 8, 1)',
                borderWidth: 2,
                pointBackgroundColor: '#eab308',
                pointRadius: 4,
                tension: 0.3,
                fill: true
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                suggestedMax: 20,
                grid: {
                  color: 'rgba(255, 255, 255, 0.05)'
                },
                ticks: {
                  color: '#94a3b8',
                  precision: 0
                }
              },
              x: {
                grid: {
                  display: false
                },
                ticks: {
                  color: '#94a3b8'
                }
              }
            }
          }
        });

        volumeChartInstanceRef.current = chart;

        return () => {
          destroyVolumeChart();
        };
      }, [safeHistory, selectedExerciseId]);

      return (
        <div className="animate-slide-up">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <Card className="flex flex-col items-center justify-center py-6">
              <Icon name="trophy" className="text-yellow-500 mb-2" size={32} />
              <span className="text-3xl font-bold text-white">
                {totalWorkouts}
              </span>
              <span className="text-xs text-gray-400 uppercase tracking-wider">
                Тренировок
              </span>
            </Card>

            <Card className="flex flex-col items-center justify-center py-6">
              <Icon name="activity" className="text-green-500 mb-2" size={32} />
              <span className="text-3xl font-bold text-white">
                {totalSets}
              </span>
              <span className="text-xs text-gray-400 uppercase tracking-wider">
                Подходов
              </span>
            </Card>

            <Card className="flex flex-col items-center justify-center py-6">
              <Icon name="clock" className="text-blue-500 mb-2" size={32} />
              <span className="text-3xl font-bold text-white">
                {formatTime(averageDuration)}
              </span>
              <span className="text-xs text-gray-400 uppercase tracking-wider">
                Среднее время
              </span>
            </Card>

            <Card className="flex flex-col items-center justify-center py-6 relative">
              {streak > 0 && (
                <div className="absolute top-2 right-2 streak-indicator">
                  {streak} дней
                </div>
              )}

              <Icon name="flame" className="text-orange-500 mb-2" size={32} />
              <span className="text-3xl font-bold text-white">
                {streak}
              </span>
              <span className="text-xs text-gray-400 uppercase tracking-wider">
                Дней подряд
              </span>
            </Card>
          </div>

          <Card className="mb-6">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-white font-bold flex items-center gap-2">
                <Icon name="bar-chart-3" size={18} className="text-purple-400" />
                Тренировочный объём
              </h3>

              <span className="text-2xl font-bold text-purple-400">
                {trainingVolume} кг
              </span>
            </div>

            <p className="text-sm text-gray-500 mb-4">
              Суммарный вес (кг) за все тренировки: {totalWorkouts} тренировок × {totalSets} подходов
            </p>
          </Card>

          <Card className="h-80 mb-6">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-white font-bold flex items-center gap-2">
                <Icon name="trending-up" size={18} className="text-indigo-400" />
                Прогресс
              </h3>

              <div className="flex gap-2">
                {['week', 'month', 'all'].map(range => (
                  <button
                    key={range}
                    onClick={() => setTimeRange(range)}
                    className={`px-3 py-1 text-xs rounded-lg transition-all ${timeRange === range ? 'bg-indigo-600 text-white' : 'bg-white/5 text-gray-400 hover:text-white'}`}
                  >
                    {range === 'week' ? 'Неделя' : range === 'month' ? 'Месяц' : 'Все'}
                  </button>
                ))}
              </div>
            </div>

            <div className="h-56 relative">
              {safeHistory.length > 0 ? (
                <canvas ref={chartRef}></canvas>
              ) : (
