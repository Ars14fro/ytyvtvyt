    const ScheduleView = ({
      programs = [],
      onSelectProgram,
      onDeleteProgram,
      history = []
    }) => {
      const currentDay = getCurrentDay();

      const safePrograms = Array.isArray(programs) ? programs : [];
      const safeHistory = Array.isArray(history) ? history : [];

      const hasValidDay = safePrograms.some(p => {
        return WEEK_DAYS.some(d => d.id === p?.dayOfWeek);
      });

      const isCyclic = safePrograms.length > 0 && !hasValidDay;

      let cyclicTodayId = null;

      if (isCyclic) {
        const sortedPrograms = [...safePrograms].sort((a, b) => {
          return String(a?.dayOfWeek || '').localeCompare(String(b?.dayOfWeek || ''));
        });

        if (safeHistory.length > 0) {
          const lastProgId = safeHistory[safeHistory.length - 1]?.programId;
          const lastIdx = sortedPrograms.findIndex(p => p?.id === lastProgId);

          if (lastIdx !== -1) {
            cyclicTodayId =
              sortedPrograms[(lastIdx + 1) % sortedPrograms.length]?.dayOfWeek ||
              null;
          }
        }

        if (!cyclicTodayId) {
          cyclicTodayId = sortedPrograms[0]?.dayOfWeek || null;
        }
      }

      const activeCurrentDay = isCyclic ? cyclicTodayId : currentDay;

      const programsByDay = useMemo(() => {
        const grouped = {};

        safePrograms.forEach(p => {
          const key = p?.dayOfWeek || 'Без дня';

          if (!grouped[key]) {
            grouped[key] = [];
          }

          grouped[key].push(p);
        });

        return grouped;
      }, [safePrograms]);

      const customDays = useMemo(() => {
        return Object.keys(programsByDay).filter(id => {
          return !WEEK_DAYS.some(wd => wd.id === id);
        });
      }, [programsByDay]);

      const initialSelectedDay =
        activeCurrentDay ||
        (customDays.length > 0 ? customDays[0] : currentDay);

      const [selectedDay, setSelectedDay] = useState(initialSelectedDay);

      const selectedDayPrograms = programsByDay[selectedDay] || [];

      const selectedDayFullName =
        WEEK_DAYS.find(d => d.id === selectedDay)?.fullName ||
        selectedDay ||
        'День';

      return (
        <div className="animate-slide-up">
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-white">
              {getGreeting()}!
            </h1>

            <p className="text-gray-400">
              Сегодня {new Date().toLocaleDateString('ru-RU', {
                weekday: 'long',
                day: 'numeric',
                month: 'long'
              })}
            </p>
          </div>

          <Card className="mb-6">
            <h3 className="text-white font-bold mb-4">
              Расписание на неделю
            </h3>

            <div className="schedule-grid mb-4">
              {WEEK_DAYS.map(day => {
                const dayPrograms = programsByDay[day.id] || [];
                const isToday = day.id === currentDay;
                const hasWorkout = dayPrograms.length > 0;

                return (
                  <div
                    key={day.id}
                    className={`schedule-day ${isToday ? 'active' : ''} ${hasWorkout ? 'has-workout' : 'rest-day'} ${selectedDay === day.id ? 'ring-2 ring-indigo-500' : ''}`}
                    onClick={() => setSelectedDay(day.id)}
                  >
                    <span className="text-xs font-bold">
                      {day.name}
                    </span>

                    {hasWorkout && (
                      <div className="mt-1 flex gap-1">
                        {dayPrograms.map(p => (
                          <div
                            key={p.id}
                            className="w-1 h-1 rounded-full"
                            style={{
                              backgroundColor: p.color || '#6366f1'
                            }}
                          />
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {customDays.length > 0 && (
              <div className="mt-6 pt-4 border-t border-white/10">
                <h4 className="text-xs text-gray-500 uppercase tracking-widest mb-3">
                  Сплиты / Циклы
                </h4>

                <div className="flex flex-wrap gap-2">
                  {customDays.map(dayId => (
                    <button
                      key={dayId}
                      onClick={() => setSelectedDay(dayId)}
                      className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${selectedDay === dayId ? 'bg-indigo-600 text-white shadow-lg' : 'bg-surface border border-white/10 text-gray-400 hover:text-white'}`}
                    >
                      {dayId}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </Card>

          <div className="mb-6">
            <h3 className="text-white font-bold mb-4 flex items-center gap-2">
              {selectedDay === activeCurrentDay
                ? 'Тренировка на сегодня'
                : `Тренировки на ${selectedDayFullName}`}

              {isCyclic && selectedDay === activeCurrentDay && (
                <span className="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/30 uppercase">
                  Цикл
                </span>
              )}
            </h3>

            {selectedDayPrograms.length > 0 ? (
              <div className="space-y-3">
                {selectedDayPrograms.map(program => (
                  <Card
                    key={program.id}
                    hover
                    active={selectedDay === activeCurrentDay}
                  >
                    <div className="flex items-start justify-between">
                      <div
                        className="flex-1 cursor-pointer"
                        onClick={() => onSelectProgram(program)}
                      >
                        <div className="flex items-center gap-2 mb-2">
                          <div
                            className="w-3 h-3 rounded-full"
                            style={{
                              backgroundColor: program.color || '#6366f1'
                            }}
                          ></div>

                          <h4 className="font-bold text-white">
                            {program.scheduleName}
                          </h4>
                        </div>

                        <p className="text-sm text-gray-400 mb-3">
                          {program.description || 'Без описания'}
                        </p>

                        <div className="flex items-center gap-4 text-sm">
                          <div className="flex items-center gap-1">
                            <Icon name="repeat" size={14} className="text-gray-500" />
                            <span>
                              {Array.isArray(program.exercises) ? program.exercises.length : 0} упражнений
                            </span>
                          </div>

                          <div className="flex items-center gap-1">
                            <Icon name="clock" size={14} className="text-gray-500" />
                            <span>
                              ~{estimateProgramDuration(program)} мин
                            </span>
                          </div>
                        </div>
                      </div>

                      <div className="flex items-center gap-2 ml-2">
                        <button
                          onClick={() => onSelectProgram(program)}
                          className="p-2 bg-indigo-500/20 text-indigo-400 rounded-lg hover:bg-indigo-500/30"
                        >
                          <Icon name="play" size={16} />
                        </button>

                        <button
                          onClick={(e) => {
                            e.stopPropagation();

                            if (confirm('Удалить эту программу?')) {
                              onDeleteProgram(program.id);
                            }
                          }}
                          className="p-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30"
                        >
                          <Icon name="trash-2" size={16} />
                        </button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            ) : (
              <Card>
                <div className="text-center py-8">
                  <Icon name="calendar" size={48} className="text-gray-600 mx-auto mb-3" />
                  <p className="text-gray-400">
                    Нет тренировок на этот день
                  </p>
                </div>
              </Card>
            )}
          </div>
        </div>
      );
    };

    const ProgramDetailView = ({
      program,
      onClose,
      onStartWorkout,
      onEdit,
      reminders = [],
      setReminders
    }) => {
      const safeReminders = Array.isArray(reminders) ? reminders : [];

      const pendingPreWorkout = safeReminders.filter(r => {
        return r?.trigger === 'pre_workout' &&
               r?.lastCompleted !== new Date().toDateString();
      });

      const safeExercises = Array.isArray(program?.exercises)
        ? program.exercises
        : [];

      const totalSets = safeExercises.reduce((acc, ex) => {
        return acc + Math.max(1, toFiniteNumber(ex?.sets, 1));
      }, 0);

      const estimatedDuration = estimateProgramDuration(program);

      const handleStartClick = () => {
        AudioEngine.init();

        if (AudioEngine.ctx && AudioEngine.ctx.state === 'suspended') {
          AudioEngine.ctx.resume();
        }

        onStartWorkout(program);
      };

      const handleRemindersDone = () => {
        const today = new Date().toDateString();

        if (!setReminders) {
          return;
        }

        setReminders(prev => {
          const safePrev = Array.isArray(prev) ? prev : [];

          return safePrev
            .filter(r => {
              if (
                r.frequency === 'once' &&
                pendingPreWorkout.find(p => p.id === r.id)
              ) {
                return false;
              }

              return true;
            })
            .map(r => {
              if (pendingPreWorkout.find(p => p.id === r.id)) {
                return {
                  ...r,
                  lastCompleted: today
                };
              }

              return r;
            });
        });
      };

      return (
        <Modal isOpen={true} onClose={onClose} title={program.scheduleName} size="lg">
          <div className="space-y-6">
            {pendingPreWorkout.length > 0 && (
              <div className="bg-red-500/10 border border-red-500/30 p-4 rounded-xl animate-pulse-slow shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                <h4 className="text-red-400 font-bold flex items-center gap-2 mb-2">
                  <Icon name="alert-circle" size={18} />
                  Требуется приём добавок!
                </h4>

                <ul className="text-sm text-red-200 mb-3 space-y-1">
                  {pendingPreWorkout.map(r => (
                    <li key={r.id} className="flex justify-between">
                      <span>• {r.title}</span>
                      <span>{r.dosage}</span>
                    </li>
                  ))}
                </ul>

                <Button
                  size="sm"
                  variant="danger"
                  className="w-full"
                  onClick={handleRemindersDone}
                >
                  Я всё выпил!
                </Button>
              </div>
            )}

            <div>
              <div className="flex items-center gap-2 mb-2">
                <div
                  className="w-4 h-4 rounded-full"
                  style={{
                    backgroundColor: program.color || '#6366f1'
                  }}
                ></div>

                <span className="text-sm text-gray-400">
                  {program.dayOfWeek === getCurrentDay()
                    ? 'Сегодня'
                    : WEEK_DAYS.find(d => d.id === program.dayOfWeek)?.fullName || program.dayOfWeek || 'Без дня'}
                </span>
              </div>

              {program.description && (
                <p className="text-gray-400">
                  {program.description}
                </p>
              )}
            </div>

            <div className="grid grid-cols-3 gap-3">
              <div className="bg-surface/30 p-3 rounded-xl text-center">
                <p className="text-xs text-gray-500 uppercase">
                  Упражнения
                </p>

                <p className="text-xl font-bold text-white">
                  {safeExercises.length}
                </p>
              </div>

              <div className="bg-surface/30 p-3 rounded-xl text-center">
                <p className="text-xs text-gray-500 uppercase">
                  Подходы
                </p>

                <p className="text-xl font-bold text-white">
                  {totalSets}
                </p>
              </div>

              <div className="bg-surface/30 p-3 rounded-xl text-center">
                <p className="text-xs text-gray-500 uppercase">
                  Время
                </p>

                <p className="text-xl font-bold text-white">
                  {estimatedDuration} мин
                </p>
              </div>
            </div>

            <div>
              <h4 className="text-white font-bold mb-3">
                Упражнения
              </h4>

              <div className="space-y-3">
                {safeExercises.map(exercise => (
                  <ExerciseCard
                    key={exercise.id}
                    exercise={exercise}
                    active={false}
                    compact={false}
                    globalRestTime={program.globalRestTime}
                  />
                ))}
              </div>
            </div>

            <div className="flex gap-3 pt-4">
              <Button
                variant="secondary"
                onClick={onEdit}
                className="flex-1"
                icon="edit-3"
              >
                Редактировать
              </Button>

              <Button
                variant="primary"
                onClick={handleStartClick}
                className="flex-1"
                icon="play"
              >
                Начать тренировку
              </Button>
            </div>
          </div>
        </Modal>
      );
    };

    const AchievementsModal = ({ isOpen, onClose, unlockedIds = [] }) => {
      const safeUnlocked = Array.isArray(unlockedIds) ? unlockedIds : [];

      const sortedAchievements = Object.entries(ACHIEVEMENTS).sort(([idA], [idB]) => {
        const aUnlocked = safeUnlocked.includes(idA);
        const bUnlocked = safeUnlocked.includes(idB);

        if (aUnlocked === bUnlocked) {
          return 0;
        }

        return aUnlocked ? -1 : 1;
      });

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Достижения" size="lg">
          <p className="text-gray-400 mb-4">
            Вы открыли {safeUnlocked.length} из {Object.keys(ACHIEVEMENTS).length} достижений.
          </p>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {sortedAchievements.map(([id, achievement]) => {
              const isUnlocked = safeUnlocked.includes(id);

              return (
                <div
                  key={id}
                  className={`p-4 rounded-xl border transition-all duration-300 ${isUnlocked ? 'bg-surface border-yellow-500/30' : 'bg-surface/30 border-white/5 opacity-60'}`}
                >
                  <div className="flex items-center gap-4">
                    <div
                      className={`w-12 h-12 rounded-lg flex items-center justify-center ${isUnlocked ? 'bg-yellow-500/10 text-yellow-400' : 'bg-white/5 text-gray-500'}`}
                    >
                      <Icon
                        name={isUnlocked ? achievement.icon : 'lock'}
                        size={24}
                      />
                    </div>

                    <div className="flex-1">
                      <h4 className={`font-bold ${isUnlocked ? 'text-white' : 'text-gray-400'}`}>
                        {achievement.name}
                      </h4>

                      <p className="text-xs text-gray-500">
                        {isUnlocked ? achievement.description : '???'}
                      </p>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </Modal>
      );
    };

    const RemindersView = ({ reminders = [], setReminders }) => {
      const [isAdding, setIsAdding] = useState(false);

      const [newReminder, setNewReminder] = useState({
        title: '',
        dosage: '',
        trigger: 'pre_workout',
        time: '09:00',
        frequency: 'daily'
      });

      const safeReminders = Array.isArray(reminders) ? reminders : [];

      const handleAdd = () => {
        if (!newReminder.title.trim()) {
          return;
        }

        if (!setReminders) {
          return;
        }

        setReminders(prev => {
          const safePrev = Array.isArray(prev) ? prev : [];

          return [
            ...safePrev,
            {
              ...newReminder,
              id: generateId(),
              lastCompleted: null
            }
          ];
        });

        setIsAdding(false);

        setNewReminder({
          title: '',
          dosage: '',
          trigger: 'pre_workout',
          time: '09:00',
          frequency: 'daily'
        });
      };

      const toggleComplete = (id) => {
        if (!setReminders) {
          return;
        }

        const today = new Date().toDateString();

        setReminders(prev => {
          const safePrev = Array.isArray(prev) ? prev : [];

          return safePrev
            .filter(r => {
              if (
                r.id === id &&
                r.frequency === 'once' &&
                r.lastCompleted !== today
              ) {
                return false;
              }

              return true;
            })
            .map(r => {
              if (r.id === id) {
                return {
                  ...r,
                  lastCompleted: r.lastCompleted === today ? null : today
                };
              }

              return r;
            });
        });
      };

      const removeReminder = (id) => {
        if (!setReminders) {
          return;
        }

        if (!confirm('Удалить напоминание?')) {
          return;
        }

        setReminders(prev => {
          const safePrev = Array.isArray(prev) ? prev : [];
          return safePrev.filter(x => x.id !== id);
        });
      };

      const today = new Date().toDateString();

      return (
        <div className="animate-slide-up">
          <div className="flex justify-between items-center mb-6">
            <div>
              <h2 className="text-2xl font-bold text-white">
                Спортивные добавки
              </h2>

              <p className="text-gray-400">
                Контроль приёма витаминов и спортпита
              </p>
            </div>

            <Button
              onClick={() => setIsAdding(!isAdding)}
              icon={isAdding ? 'x' : 'plus'}
              size="sm"
            >
              {isAdding ? 'Отмена' : 'Добавить'}
            </Button>
          </div>

          {isAdding && (
            <Card className="mb-6 border-indigo-500/30">
              <div className="space-y-4">
                <div>
                  <label className="text-xs text-gray-400 uppercase">
                    Что принимаем?
                  </label>

                  <input
                    type="text"
                    placeholder="Например: Креатин"
                    className="w-full bg-dark border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-indigo-500"
                    value={newReminder.title}
                    onChange={e => setNewReminder({
                      ...newReminder,
                      title: e.target.value
                    })}
                  />
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs text-gray-400 uppercase">
                      Дозировка
                    </label>

                    <input
                      type="text"
                      placeholder="5г"
                      className="w-full bg-dark border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-indigo-500"
                      value={newReminder.dosage}
                      onChange={e => setNewReminder({
                        ...newReminder,
                        dosage: e.target.value
                      })}
                    />
                  </div>

                  <div>
                    <label className="text-xs text-gray-400 uppercase">
                      Когда?
                    </label>

                    <select
                      className="w-full bg-dark border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-indigo-500 appearance-none"
                      value={newReminder.trigger}
                      onChange={e => setNewReminder({
                        ...newReminder,
                        trigger: e.target.value
                      })}
                    >
                      <option value="pre_workout">
                        Перед тренировкой
                      </option>

                      <option value="post_workout">
                        После тренировки
                      </option>

                      <option value="time">
                        По времени
                      </option>
                    </select>
                  </div>
                </div>

                <div className={`grid ${newReminder.trigger === 'time' ? 'grid-cols-2' : 'grid-cols-1'} gap-3 mt-1`}>
                  <div>
                    <label className="text-xs text-gray-400 uppercase">
                      Частота
                    </label>

                    <select
                      className="w-full bg-dark border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-indigo-500 appearance-none"
                      value={newReminder.frequency}
                      onChange={e => setNewReminder({
                        ...newReminder,
                        frequency: e.target.value
                      })}
                    >
                      <option value="daily">
                        Раз в день
                      </option>

                      {newReminder.trigger !== 'time' && (
                        <option value="every_workout">
                          Каждую тренировку
                        </option>
                      )}

                      <option value="once">
                        Разово (удалить после)
                      </option>
                    </select>
                  </div>

                  {newReminder.trigger === 'time' && (
                    <div>
                      <label className="text-xs text-gray-400 uppercase">
                        Время (ЧЧ:ММ)
                      </label>

                      <input
                        type="time"
                        className="w-full bg-dark border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-indigo-500 color-scheme-dark"
                        value={newReminder.time}
                        onChange={e => setNewReminder({
                          ...newReminder,
                          time: e.target.value
                        })}
                      />
                    </div>
                  )}
                </div>

                <Button
                  onClick={handleAdd}
                  className="w-full"
                  variant="primary"
                >
                  Сохранить напоминание
                </Button>
              </div>
            </Card>
          )}

          <div className="space-y-3 pb-20">
            {safeReminders.length === 0 && !isAdding && (
              <p className="text-center text-gray-500 py-10">
                Нет активных напоминаний
              </p>
            )}

            {safeReminders.map(r => {
              const isDone = r.lastCompleted === today;

              return (
                <div
                  key={r.id}
                  className={`p-4 rounded-2xl border transition-all duration-300 flex items-center justify-between ${isDone ? 'bg-surface border-green-500/30 opacity-70' : 'bg-red-500/10 border-red-500/30 animate-pulse-slow'}`}
                >
                  <div className="flex items-center gap-4">
                    <button
                      onClick={() => toggleComplete(r.id)}
                      className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors ${isDone ? 'bg-green-500 border-green-500 text-white' : 'border-red-400 text-transparent hover:bg-red-500/20'}`}
                    >
                      <Icon name="check" size={16} />
                    </button>

                    <div>
                      <h4 className={`font-bold ${isDone ? 'text-gray-300 line-through' : 'text-red-400'}`}>
                        {r.title}
                        <span className="text-sm font-normal opacity-70">
                          ({r.dosage})
                        </span>
                      </h4>

                      <p className="text-xs text-gray-500">
                        {r.trigger === 'pre_workout'
                          ? 'Перед трени'
                          : r.trigger === 'post_workout'
                            ? 'После трени'
                            : `В ${r.time}`}

                        {' • '}

                        {r.frequency === 'once'
                          ? 'Разово'
                          : r.frequency === 'every_workout'
                            ? 'Каждый раз'
                            : 'Раз в день'}
                      </p>
                    </div>
                  </div>

                  <button
                    onClick={() => removeReminder(r.id)}
                    className="p-2 text-gray-500 hover:text-red-400"
                  >
                    <Icon name="trash-2" size={16} />
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const WorkspaceManagerModal = ({
      isOpen,
      onClose,
      workspaces = [],
      activeId,
      onSwitch,
      onCreate,
      onDelete,
      onRename
    }) => {
      const [newName, setNewName] = useState('');
      const [isCreating, setIsCreating] = useState(false);

      const safeWorkspaces = Array.isArray(workspaces) ? workspaces : [];

      if (!isOpen) {
        return null;
      }

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="Профили (Циклы)" size="sm">
          <div className="space-y-4">
            <p className="text-sm text-gray-400">
              Создавайте разные профили, чтобы разделять тренировочные циклы
              (например: «Сила», «Масса», «Домашняя»). У каждого профиля своя
              история, статистика и расписание.
            </p>

            <div className="space-y-2">
              {safeWorkspaces.map(ws => (
                <div
                  key={ws.id}
                  className={`flex items-center justify-between p-3 rounded-xl border ${activeId === ws.id ? 'bg-indigo-500/20 border-indigo-500/50' : 'bg-surface border-white/5'}`}
                >
                  <div
                    className="flex-1 cursor-pointer"
                    onClick={() => {
                      onSwitch(ws.id);
                      onClose();
                    }}
                  >
                    <h4 className={`font-bold ${activeId === ws.id ? 'text-indigo-300' : 'text-white'}`}>
                      {ws.name}
                    </h4>

                    {activeId === ws.id && (
                      <span className="text-xs text-indigo-400">
                        Текущий профиль
                      </span>
                    )}
                  </div>

                  <div className="flex gap-1">
                    <button
                      onClick={() => {
                        const nn = prompt('Новое название:', ws.name);

                        if (nn && nn.trim()) {
                          onRename(ws.id, nn.trim());
                        }
                      }}
                      className="p-2 text-gray-400 hover:text-white"
                    >
                      <Icon name="edit-2" size={16} />
                    </button>

                    {safeWorkspaces.length > 1 && (
                      <button
                        onClick={() => {
                          if (confirm(`Удалить профиль "${ws.name}" и ВСЮ его историю?`)) {
                            onDelete(ws.id);
                          }
                        }}
                        className="p-2 text-red-400 hover:text-red-300"
                      >
                        <Icon name="trash-2" size={16} />
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {isCreating ? (
              <div className="flex gap-2 mt-4">
                <input
                  type="text"
                  value={newName}
                  onChange={e => setNewName(e.target.value)}
                  placeholder="Имя профиля..."
                  className="flex-1 bg-dark border border-white/10 rounded-lg px-3 py-2 text-white outline-none focus:border-indigo-500"
                  autoFocus
                />

                <Button
                  size="sm"
                  onClick={() => {
                    if (newName.trim()) {
                      onCreate(newName.trim());
                      setIsCreating(false);
                      setNewName('');
                    }
                  }}
                >
                  Добавить
                </Button>

                <Button
                  size="sm"
                  variant="ghost"
                  onClick={() => setIsCreating(false)}
                >
                  Отмена
                </Button>
              </div>
            ) : (
              <Button
                variant="secondary"
                icon="plus"
                className="w-full mt-4"
                onClick={() => setIsCreating(true)}
              >
                Создать новый профиль
              </Button>
            )}
          </div>
        </Modal>
      );
    };

    /* ===== КОНЕЦ ЧАСТИ 5/6 (ВЕРСИЯ 2) ===== */
    /* ===== ЧАСТЬ 6/6 (ВЕРСИЯ 2): APP, RENDER, SERVICE WORKER, CLOSE FILE ===== */

    const getStorageSuffix = (workspaceId) => {
      return workspaceId === 'default' ? '' : `_${workspaceId}`;
    };

    const hasLocalForage = () => {
      return typeof window !== 'undefined' && Boolean(window.localforage);
    };

    const App = () => {
      const [workspaces, setWorkspaces] = useState([
        {
          id: 'default',
          name: 'Основной профиль'
        }
      ]);

      const [activeWorkspaceId, setActiveWorkspaceId] = useState('default');
      const [isWorkspaceManagerOpen, setIsWorkspaceManagerOpen] = useState(false);

      const [view, setView] = useState('schedule');
      const [programs, setPrograms] = useState([]);
      const [activeWorkout, setActiveWorkout] = useState(null);
      const [history, setHistory] = useState([]);
      const [selectedProgram, setSelectedProgram] = useState(null);
      const [notifications, setNotifications] = useState([]);
      const [settings, setSettings] = useState(DEFAULT_SETTINGS.player);
      const [reminders, setReminders] = useState([]);

      const [isAppInitialized, setIsAppInitialized] = useState(false);
      const [isEditorOpen, setIsEditorOpen] = useState(false);
      const [isAchievementsOpen, setIsAchievementsOpen] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const [unlockedAchievements, setUnlockedAchievements] = useState([]);

      const checkedDraftsRef = useRef(new Set());
      const currentDataWorkspaceRef = useRef('default');
      const remindersRef = useRef(reminders);
      const notifiedRemindersRef = useRef(new Set());

      const addNotification = useCallback((type, title, message) => {
        const id = generateId();

        setNotifications(prev => [
          ...prev,
          {
            id,
            type,
            title,
            message
          }
        ]);
      }, []);

      const removeNotification = useCallback((id) => {
        setNotifications(prev => prev.filter(n => n.id !== id));
      }, []);

      useEffect(() => {
        remindersRef.current = reminders;
      }, [reminders]);

      useEffect(() => {
        const interval = setInterval(() => {
          const now = new Date();
          const todayStr = now.toDateString();

          const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

          const safeReminders = Array.isArray(remindersRef.current)
            ? remindersRef.current
            : [];

          safeReminders.forEach(r => {
            if (
              r?.trigger === 'time' &&
              r?.time === timeStr &&
              r?.lastCompleted !== todayStr
            ) {
              const notifKey = `${r.id}_${todayStr}`;

              if (!notifiedRemindersRef.current.has(notifKey)) {
                addNotification(
                  'info',
                  'Время добавок!',
                  `Примите: ${r.title} (${r.dosage})`
                );

                notifiedRemindersRef.current.add(notifKey);
              }
            }
          });
        }, 10000);

        return () => clearInterval(interval);
      }, [addNotification]);

      useEffect(() => {
        const initApp = async () => {
          try {
            if (!hasLocalForage()) {
              console.warn('localforage не загружен. Данные не будут сохраняться.');
              return;
            }

            const [w, a, s] = await Promise.all([
              window.localforage.getItem('flexcode_workspaces'),
              window.localforage.getItem('flexcode_active_workspace'),
              window.localforage.getItem('flexcode_settings')
            ]);

            if (Array.isArray(w) && w.length > 0) {
              setWorkspaces(w);
            }

            if (a) {
              setActiveWorkspaceId(a);
            }

            if (s && typeof s === 'object') {
              setSettings({
                ...DEFAULT_SETTINGS.player,
                ...s
              });
            }
          } catch (error) {
            console.error('Ошибка инициализации приложения:', error);
          } finally {
            setIsAppInitialized(true);
          }
        };

        initApp();
      }, []);

      useEffect(() => {
        if (!isAppInitialized) {
          return;
        }

        let isMounted = true;

        const loadWorkspaceData = async () => {
          setIsLoading(true);

          if (!hasLocalForage()) {
            if (isMounted) {
              setPrograms(DEFAULT_PROGRAM);
              setHistory([]);
              setUnlockedAchievements([]);
              setReminders([]);

              currentDataWorkspaceRef.current = activeWorkspaceId;
              setIsLoading(false);
            }

            return;
          }

          try {
            const suffix = getStorageSuffix(activeWorkspaceId);

            const [p, h, ach, r] = await Promise.all([
              window.localforage.getItem(`flexcode_programs${suffix}`),
              window.localforage.getItem(`flexcode_history${suffix}`),
              window.localforage.getItem(`flexcode_achievements${suffix}`),
              window.localforage.getItem(`flexcode_reminders${suffix}`)
            ]);

            if (isMounted) {
              setPrograms(Array.isArray(p) ? p : DEFAULT_PROGRAM);
              setHistory(Array.isArray(h) ? h : []);
              setUnlockedAchievements(Array.isArray(ach) ? ach : []);
              setReminders(Array.isArray(r) ? r : []);

              currentDataWorkspaceRef.current = activeWorkspaceId;

              await window.localforage.setItem(
                'flexcode_active_workspace',
                activeWorkspaceId
              );
            }
          } catch (error) {
            console.error('Ошибка загрузки данных профиля:', error);

            if (isMounted) {
              setPrograms(DEFAULT_PROGRAM);
              setHistory([]);
              setUnlockedAchievements([]);
              setReminders([]);

              currentDataWorkspaceRef.current = activeWorkspaceId;
            }
          } finally {
            if (isMounted) {
              setIsLoading(false);
            }
          }
        };

        loadWorkspaceData();

        return () => {
          isMounted = false;
        };
      }, [activeWorkspaceId, isAppInitialized]);

      useEffect(() => {
        if (
          !isLoading &&
          isAppInitialized &&
          currentDataWorkspaceRef.current === activeWorkspaceId &&
          hasLocalForage()
        ) {
          const suffix = getStorageSuffix(activeWorkspaceId);

          window.localforage.setItem(`flexcode_programs${suffix}`, programs);
          window.localforage.setItem(`flexcode_history${suffix}`, history);
          window.localforage.setItem(`flexcode_achievements${suffix}`, unlockedAchievements);
          window.localforage.setItem(`flexcode_reminders${suffix}`, reminders);

          window.localforage.setItem('flexcode_settings', settings);
          window.localforage.setItem('flexcode_workspaces', workspaces);
        }
      }, [
        programs,
        history,
        settings,
        unlockedAchievements,
        reminders,
        activeWorkspaceId,
        workspaces,
        isLoading,
        isAppInitialized
      ]);

      useEffect(() => {
        if (isAppInitialized && !isLoading) {
          if (!checkedDraftsRef.current.has(activeWorkspaceId)) {
            checkedDraftsRef.current.add(activeWorkspaceId);

            const draft = safeParse(
              localStorage.getItem(`flexcode_draft_${activeWorkspaceId}`),
              null
            );

            if (
              draft &&
              draft.timestamp &&
              Date.now() - draft.timestamp < 12 * 60 * 60 * 1000 &&
              Array.isArray(programs) &&
              programs.some(p => p.id === draft.workout?.id)
            ) {
              if (confirm('Найдена незавершённая тренировка. Продолжить?')) {
                setActiveWorkout(draft.workout);
              } else {
                localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
              }
            } else if (draft) {
              localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
            }
          }
        }
      }, [isAppInitialized, isLoading, activeWorkspaceId, programs]);

      const progressedPrograms = useMemo(() => {
        if (isLoading) {
          return [];
        }

        return programs.map(p => calculateProgression(p, history));
      }, [programs, history, isLoading]);

      const handleNewAchievements = useCallback((newIds = []) => {
        if (!Array.isArray(newIds) || newIds.length === 0) {
          return;
        }

        setUnlockedAchievements(prev => {
          const updated = [
            ...new Set([
              ...(Array.isArray(prev) ? prev : []),
              ...newIds
            ])
          ];

          return updated;
        });

        newIds.forEach((id, index) => {
          const achievement = ACHIEVEMENTS[id];

          if (achievement) {
            setTimeout(() => {
              addNotification(
                'success',
                `Достижение: ${achievement.name}`,
                achievement.description
              );

              AudioEngine.playComplete();
            }, 500 * (index + 1));
          }
        });
      }, [addNotification]);

      const handleProgramSave = (newPrograms) => {
        setPrograms(newPrograms);

        localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);

        const newAchievementIds = AchievementEngine.check(
          'onProgramSave',
          {
            programs: newPrograms
          },
          unlockedAchievements
        );

        handleNewAchievements(newAchievementIds);

        setIsEditorOpen(false);

        AudioEngine.playBeep();

        addNotification(
          'success',
          'Программа сохранена',
          'Все изменения успешно сохранены'
        );
      };

      const handleWorkoutComplete = (result) => {
        if (!activeWorkout) {
          return;
        }

        const duration = toFiniteNumber(result?.duration, 0);

        const completedSets = Array.isArray(result?.completedSets)
          ? result.completedSets
          : [];

        if (completedSets.length === 0 || duration < 10) {
          addNotification(
            'error',
            'Слишком короткая тренировка',
            'Выполни хотя бы один подход или потренируйся дольше.'
          );

          setActiveWorkout(null);
          localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);

          return;
        }

        const record = {
          id: generateId(),
          date: new Date().toISOString(),
          programName: activeWorkout.scheduleName,
          programId: activeWorkout.id,
          ...result,
          completedSets
        };

        const newHistory = [...history, record];

        setHistory(newHistory);

        setPrograms(prevPrograms => {
          return prevPrograms.map(p => {
            if (p.id !== record.programId) {
              return p;
            }

            const progressed = calculateProgression(p, newHistory);

            return stripProgramProgressionMeta(progressed);
          });
        });

        const achievementPrograms = programs.map(p => {
          if (p.id !== record.programId) {
            return p;
          }

          return calculateProgression(p, newHistory);
        });

        const newAchievementIds = AchievementEngine.check(
          'onWorkoutComplete',
          {
            workoutResult: result,
            history: newHistory,
            programs: achievementPrograms
          },
          unlockedAchievements
        );

        handleNewAchievements(newAchievementIds);

        setActiveWorkout(null);
        localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);

        addNotification(
          'success',
          'Тренировка завершена',
          'Отличная работа!'
        );

        const today = new Date().toDateString();

        const pendingPost = reminders.filter(r => {
          return r?.trigger === 'post_workout' &&
                 r?.lastCompleted !== today;
        });

        if (pendingPost.length > 0) {
          pendingPost.forEach((r, idx) => {
            setTimeout(() => {
              addNotification(
                'warning',
                'Время добавок!',
                `Не забудьте: ${r.title} (${r.dosage})`
              );
            }, 1500 + idx * 1000);
          });
        }

        setReminders(prev => {
          const safePrev = Array.isArray(prev) ? prev : [];

          return safePrev
            .filter(r => {
              if (
                r.frequency === 'once' &&
                pendingPost.find(p => p.id === r.id)
              ) {
                return false;
              }

              return true;
            })
            .map(r => {
              if (r.frequency === 'every_workout' && r.lastCompleted === today) {
                return r;
              }

              if (r.frequency === 'every_workout') {
                return {
                  ...r,
                  lastCompleted: null
                };
              }

              if (pendingPost.find(p => p.id === r.id)) {
                return {
                  ...r,
                  lastCompleted: today
                };
              }

              return r;
            });
        });

        if (settings.enableVibration && 'vibrate' in navigator) {
          navigator.vibrate([200, 100, 200]);
        }
      };

      const handleDeleteProgram = (programId) => {
        setPrograms(prev => prev.filter(p => p.id !== programId));

        const draft = safeParse(
          localStorage.getItem(`flexcode_draft_${activeWorkspaceId}`),
          null
        );

        if (draft && draft.workout && draft.workout.id === programId) {
          localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);

          if (activeWorkout && activeWorkout.id === programId) {
            setActiveWorkout(null);
          }
        }

        addNotification(
          'info',
          'Программа удалена',
          'Программа была успешно удалена'
        );
      };

      const handleSettingsChange = (newSettings) => {
        setSettings(newSettings);

        const newAchievementIds = AchievementEngine.check(
          'onSettingsChange',
          {},
          unlockedAchievements
        );

        handleNewAchievements(newAchievementIds);

        addNotification(
          'success',
          'Настройки сохранены',
          'Все настройки успешно обновлены'
        );
      };

      const handleCreateWorkspace = (name) => {
        const newId = 'ws_' + Date.now();

        setWorkspaces(prev => [
          ...prev,
          {
            id: newId,
            name
          }
        ]);

        setActiveWorkspaceId(newId);
      };

      const handleDeleteWorkspace = (id) => {
        const updated = workspaces.filter(w => w.id !== id);

        let nextWorkspaces = updated;

        if (nextWorkspaces.length === 0) {
          nextWorkspaces = [
            {
              id: 'default',
              name: 'Основной профиль'
            }
          ];
        }

        setWorkspaces(nextWorkspaces);

        if (activeWorkspaceId === id) {
          const nextId = nextWorkspaces[0].id;

          setIsLoading(true);

          setActiveWorkspaceId(nextId);

          setPrograms([]);
          setHistory([]);
          setReminders([]);
          setUnlockedAchievements([]);

          currentDataWorkspaceRef.current = nextId;
        }

        if (hasLocalForage()) {
          const suffix = getStorageSuffix(id);

          window.localforage.removeItem(`flexcode_programs${suffix}`);
          window.localforage.removeItem(`flexcode_history${suffix}`);
          window.localforage.removeItem(`flexcode_achievements${suffix}`);
          window.localforage.removeItem(`flexcode_reminders${suffix}`);
        }

        localStorage.removeItem(`flexcode_draft_${id}`);

        if (activeWorkout) {
          setActiveWorkout(null);
        }
      };

      const handleRenameWorkspace = (id, newName) => {
        setWorkspaces(prev => {
          return prev.map(w => {
            if (w.id === id) {
              return {
                ...w,
                name: newName
              };
            }

            return w;
          });
        });
      };

      if (isLoading) {
        return (
          <div className="min-h-screen bg-dark flex flex-col items-center justify-center">
            <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>

            <p className="text-indigo-400 font-medium">
              Загрузка...
            </p>
          </div>
        );
      }

      return (
        <div className="min-h-screen safe-pb pb-24 relative">
          {notifications.map(notification => (
            <Notification
              key={notification.id}
              {...notification}
              onClose={() => removeNotification(notification.id)}
            />
          ))}

          <div className="sticky top-0 z-30 px-6 py-4 glass-header flex justify-between items-center safe-pt">
            <div
              className="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity"
              onClick={() => setIsWorkspaceManagerOpen(true)}
            >
              <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <Icon name="dumbbell" className="text-white" size={18} />
              </div>

              <div className="flex flex-col">
                <span className="font-bold text-lg tracking-tight text-white leading-none">
                  FlexCode<span className="text-indigo-500">Pro</span>
                </span>

                <span className="text-[10px] text-gray-400 font-medium uppercase tracking-wider flex items-center gap-1 mt-1">
                  {workspaces.find(w => w.id === activeWorkspaceId)?.name || 'Профиль'}
                  <Icon name="chevron-down" size={10} />
                </span>
              </div>
            </div>

            <div className="flex gap-2">
              <button
                onClick={() => setIsEditorOpen(true)}
                className="p-2 rounded-lg bg-surface border border-white/10 text-gray-300 hover:text-white hover:border-indigo-500/50 transition-all"
              >
                <Icon name="edit-3" size={20} />
              </button>

              <button
                onClick={() => setView('stats')}
                className="p-2 rounded-lg bg-surface border border-white/10 text-gray-300 hover:text-white hover:border-indigo-500/50 transition-all"
              >
                <Icon name="bar-chart-2" size={20} />
              </button>

              <button
                onClick={() => setIsAchievementsOpen(true)}
                className="p-2 rounded-lg bg-surface border border-white/10 text-gray-300 hover:text-white hover:border-yellow-500/50 transition-all relative"
              >
                <Icon name="trophy" size={20} />

                {unlockedAchievements.length > 0 && (
                  <span className="absolute -top-1 -right-1 w-4 h-4 bg-yellow-500 text-black text-[10px] font-bold rounded-full flex items-center justify-center">
                    {unlockedAchievements.length}
                  </span>
                )}
              </button>
            </div>
          </div>

          <div className="p-4 sm:p-6 max-w-2xl mx-auto">
            {view === 'schedule' && (
              <ScheduleView
                programs={progressedPrograms}
                history={history}
                onSelectProgram={(program) => {
                  const progressedVersion = progressedPrograms.find(p => p.id === program.id);
                  setSelectedProgram(progressedVersion || program);
                }}
                onDeleteProgram={handleDeleteProgram}
              />
            )}

            {view === 'stats' && (
              <StatsDashboard
                history={history}
                programs={progressedPrograms}
              />
            )}

            {view === 'reminders' && (
              <RemindersView
                reminders={reminders}
                setReminders={setReminders}
              />
            )}

            {view === 'programs' && (
              <div className="animate-slide-up">
                <h2 className="text-2xl font-bold text-white mb-6">
                  Все программы
                </h2>

                <div className="space-y-4">
                  {progressedPrograms.map(program => (
                    <Card key={program.id} hover>
                      <div className="flex items-center justify-between">
                        <div
                          className="flex-1 cursor-pointer"
                          onClick={() => setSelectedProgram(program)}
                        >
                          <div className="flex items-center gap-2 mb-1">
                            <div
                              className="w-3 h-3 rounded-full"
                              style={{
                                backgroundColor: program.color || '#6366f1'
                              }}
                            ></div>

                            <h4 className="font-bold text-white">
                              {program.scheduleName}
                            </h4>
                          </div>

                          <p className="text-sm text-gray-500">
                            {Array.isArray(program.exercises) ? program.exercises.length : 0} упражнений •{' '}
                            {WEEK_DAYS.find(d => d.id === program.dayOfWeek)?.fullName || program.dayOfWeek || 'Без дня'}
                          </p>
                        </div>

                        <div className="flex items-center gap-2">
                          <button
                            onClick={() => setSelectedProgram(program)}
                            className="p-2 bg-indigo-500/20 text-indigo-400 rounded-lg hover:bg-indigo-500/30"
                          >
                            <Icon name="eye" size={16} />
                          </button>

                          <button
                            onClick={() => {
                              if (confirm('Удалить эту программу?')) {
                                handleDeleteProgram(program.id);
                              }
                            }}
                            className="p-2 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/30"
                          >
                            <Icon name="trash-2" size={16} />
                          </button>
                        </div>
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            )}
          </div>

          <div className="fixed bottom-0 w-full glass-panel border-t border-white/5 pb-[env(safe-area-inset-bottom)] z-40">
            <div className="flex justify-around items-center h-16 max-w-lg mx-auto">
              <button
                onClick={() => setView('schedule')}
                className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'schedule' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}
              >
                <Icon
                  name="calendar"
                  size={22}
                  className={view === 'schedule' ? 'stroke-[2.5px]' : ''}
                />

                <span className="text-[10px] font-medium">
                  Расписание
                </span>
              </button>

              <button
                onClick={() => setView('programs')}
                className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'programs' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}
              >
                <Icon
                  name="list"
                  size={22}
                  className={view === 'programs' ? 'stroke-[2.5px]' : ''}
                />

                <span className="text-[10px] font-medium">
                  Программы
                </span>
              </button>

              <button
                onClick={() => setView('stats')}
                className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'stats' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}
              >
                <Icon
                  name="bar-chart-2"
                  size={22}
                  className={view === 'stats' ? 'stroke-[2.5px]' : ''}
                />

                <span className="text-[10px] font-medium">
                  Статистика
                </span>
              </button>

              <button
                onClick={() => setView('reminders')}
                className={`flex flex-col items-center gap-1 w-full h-full justify-center ${view === 'reminders' ? 'text-indigo-400' : 'text-gray-500 hover:text-gray-300'}`}
              >
                <Icon
                  name="bell"
                  size={22}
                  className={view === 'reminders' ? 'stroke-[2.5px]' : ''}
                />

                <span className="text-[10px] font-medium">
                  Добавки
                </span>
              </button>
            </div>
          </div>

          <Modal
            isOpen={isEditorOpen}
            onClose={() => setIsEditorOpen(false)}
            title="Редактор JSON"
          >
            <JsonEditor
              initialData={programs}
              onSave={handleProgramSave}
              onClose={() => setIsEditorOpen(false)}
            />
          </Modal>

          {selectedProgram && (
            <ProgramDetailView
              program={selectedProgram}
              onClose={() => setSelectedProgram(null)}
              onStartWorkout={(workout) => {
                localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
                setActiveWorkout(workout);
              }}
              reminders={reminders}
              setReminders={setReminders}
              onEdit={() => {
                setSelectedProgram(null);
                setIsEditorOpen(true);
              }}
            />
          )}

          {activeWorkout && (
            <WorkoutPlayer
              workout={activeWorkout}
              initialDraft={safeParse(
                localStorage.getItem(`flexcode_draft_${activeWorkspaceId}`),
                null
              )}
              onClose={() => {
                setActiveWorkout(null);
                localStorage.removeItem(`flexcode_draft_${activeWorkspaceId}`);
              }}
              onComplete={handleWorkoutComplete}
              settings={settings}
              onSettingsChange={handleSettingsChange}
              history={history}
              workspaceId={activeWorkspaceId}
              onNotify={addNotification}
            />
          )}

          <AchievementsModal
            isOpen={isAchievementsOpen}
            onClose={() => setIsAchievementsOpen(false)}
            unlockedIds={unlockedAchievements}
          />

          <WorkspaceManagerModal
            isOpen={isWorkspaceManagerOpen}
            onClose={() => setIsWorkspaceManagerOpen(false)}
            workspaces={workspaces}
            activeId={activeWorkspaceId}
            onSwitch={(id) => {
              setActiveWorkspaceId(id);
              setActiveWorkout(null);
            }}
            onCreate={handleCreateWorkspace}
            onDelete={handleDeleteWorkspace}
            onRename={handleRenameWorkspace}
          />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));

    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => {
            console.log('PWA Ready');
          })
          .catch((error) => {
            console.warn('Service worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
